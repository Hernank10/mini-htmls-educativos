<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictado Bilingüe con Voz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: #eef6ff;
    }
    .card {
      border-radius: 1.5rem;
    }
    .highlight {
      background: #ffcccc;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body class="p-4">
  <div class="container">
    <h1 class="text-center mb-4">📖 Dictado Bilingüe con Voz</h1>

    <div class="card p-4 shadow">
      <h4>Seleccionar idioma</h4>
      <select id="language" class="form-select mb-3">
        <option value="es-ES">Español</option>
        <option value="en-US">English</option>
      </select>

      <h4>Ejemplos para dictado</h4>
      <select id="examples" class="form-select mb-3">
        <option value="Ayer estudié para el examen.">Ayer estudié para el examen. (ES)</option>
        <option value="El año pasado viajamos a España.">El año pasado viajamos a España. (ES)</option>
        <option value="Yesterday I studied for the test.">Yesterday I studied for the test. (EN)</option>
        <option value="Last year we traveled to Spain.">Last year we traveled to Spain. (EN)</option>
      </select>

      <button class="btn btn-primary mb-3" onclick="playDictation()">🔊 Escuchar dictado</button>

      <h4>Escribe lo que escuchaste</h4>
      <textarea id="userInput" class="form-control mb-3" rows="3" placeholder="Escribe aquí..."></textarea>

      <button class="btn btn-success mb-3" onclick="checkWriting()">✔ Verificar caligrafía</button>

      <h5>Resultado:</h5>
      <div id="result" class="p-3 bg-white rounded border" style="min-height: 80px;"></div>

    </div>
  </div>

<script>
function playDictation() {
  const text = document.getElementById("examples").value;
  const lang = document.getElementById("language").value;
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = lang;
  speech.rate = 0.9;
  window.speechSynthesis.speak(speech);
}

function checkWriting() {
  const original = document.getElementById("examples").value.trim();
  const user = document.getElementById("userInput").value.trim();

  if (user === original) {
    document.getElementById("result").innerHTML = "<strong style='color: green;'>Perfecto ✔</strong> Tu escritura coincide exactamente.";
    return;
  }

  let resultHTML = "";
  const origWords = original.split(" ");
  const userWords = user.split(" ");

  for (let i = 0; i < origWords.length; i++) {
    if (userWords[i] !== origWords[i]) {
      resultHTML += `<span class='highlight'>${userWords[i] || "(faltante)"}</span> `;
    } else {
      resultHTML += userWords[i] + " ";
    }
  }

  document.getElementById("result").innerHTML = `❌ <strong>Hay diferencias en tu escritura:</strong><br><br>${resultHTML}`;
}
</script>

</body>
</html>
