      padding: 1rem;
    }

      margin: 0 auto;
      background: var(--card-bg);

      box-shadow: 0 12px 28px var(--sombra);
      overflow: hidden;
      border: 1px solid #f0e0c0;
    }

    header {
      background: #fdf4df;
      padding: 1rem 2rem;
      border-bottom: 3px solid var(--verde-radio);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #2a7a4b;
      letter-spacing: -0.2px;
    }
    h1 small {
      font-size: 0.65rem;
      font-weight: normal;
      color: #b98f5c;
    }

    .lang-selector {
      display: flex;
      gap: 0.5rem;
      background: white;
      padding: 0.3rem;
      border-radius: 40px;
      border: 1px solid #f0e0c0;
    }
    .lang-btn {
      background: transparent;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      font-size: 0.85rem;
    }
    .lang-btn.active {
      background: var(--verde-radio);
      color: white;
    }

    nav {
      display: flex;
      gap: 0.5rem;
      background: #eaddc5;
      padding: 0.6rem 2rem;
      border-bottom: 1px solid #e6d5ba;

    }

      background: transparent;
      border: none;
      font-size: 0.95rem;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      color: #2a7a4b;
    }
    .nav-btn.active {
      background-color: var(--verde-radio);
      color: white;
    }
    .nav-btn:hover:not(.active) {
      background-color: #cfdec9;
    }

      display: none;
      padding: 2rem;
      animation: fade 0.2s ease;
    }
    .active-view { display: block; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--fondo);
      border-radius: 1.5rem;
      padding: 1rem;
      text-align: center;
      border-left: 6px solid var(--azul-dia);
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .stat-number {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--verde-radio);
    }

    .progress-bar-bg {
      background: #e2e8f0;
      border-radius: 40px;
      height: 12px;
      overflow: hidden;
      margin: 0.8rem 0;
    }
    .progress-fill {
      background: var(--verde-radio);
      width: 0%;
      height: 100%;
      transition: width 0.2s;
    }

      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
      margin-left: 0.5rem;
    }

    .slot-afternoon { background: var(--amarillo-tarde); color: #2c3e2f; }
    .slot-night { background: var(--morado-noche); color: white; }

      max-height: 65vh;
      overflow-y: auto;
      padding-right: 0.3rem;

  // --------------------- LOCALSTORAGE Y PROGRESO -------------------------
  let progreso = {};
  let currentLang = "es";

  const STORAGE_KEY = "podcastIdeasAmbC1Progreso";

  function cargarProgreso() {
    const guardado = localStorage.getItem(STORAGE_KEY);
    if (guardado) progreso = JSON.parse(guardado);
    else {
      progreso = {};
      for (let i = 1; i <= 100; i++) progreso[i] = { aciertos: 0, fallos: 0 };
    }
  }
  function guardarProgreso() { localStorage.setItem(STORAGE_KEY, JSON.stringify(progreso)); }
  function registrarResultado(id, acierto) {
    if (!progreso[id]) progreso[id] = { aciertos: 0, fallos: 0 };
    if (acierto) progreso[id].aciertos += 1;
    else progreso[id].fallos += 1;
    guardarProgreso();
    renderDashboard();
    renderListado(currentSlotFilter, currentFiltroTexto);
  }

  function obtenerTexto(item, tipo) {
    if (currentLang === 'es') return tipo === 'palabra' ? item[1] : item[3];
    if (currentLang === 'en') return tipo === 'palabra' ? item[2] : item[4];
    return tipo === 'palabra' ? `${item[1]} / ${item[2]}` : `${item[3]} / ${item[4]}`;
  }

  function getSlotClass(slot) {
    const classes = {
      'morning': 'slot-morning',
      'afternoon': 'slot-afternoon',
      'night': 'slot-night',
      'dawn': 'slot-dawn'
    };
    return classes[slot] || '';
  }

  function getSlotText(slot) {
    const texts = {
      'morning': '🌅 Mañana',
      'afternoon': '☀️ Tarde',
      'night': '🌙 Noche',
      'dawn': '🌌 Madrugada'
    };
    return texts[slot] || '';
  }

  function renderDashboard() {
    let totalAciertos = 0, totalFallos = 0, conceptosConAcierto = 0;
    for (let i = 1; i <= 100; i++) {
      const p = progreso[i] || { aciertos: 0, fallos: 0 };
      totalAciertos += p.aciertos;
      totalFallos += p.fallos;
      if (p.aciertos > 0) conceptosConAcierto++;
    }
    const porcentaje = (conceptosConAcierto / 100) * 100;
    document.getElementById("globalProgressFill").style.width = `${porcentaje}%`;
    document.getElementById("globalProgressText").innerHTML = `${conceptosConAcierto} de 100 ideas con al menos 1 acierto (${Math.round(porcentaje)}%).`;
    document.getElementById("statsContainer").innerHTML = `
      <div class="stat-card"><div class="stat-number">${totalAciertos}</div>✅ Aciertos totales</div>
      <div class="stat-card"><div class="stat-number">${totalFallos}</div>❌ Fallos</div>
      <div class="stat-card"><div class="stat-number">${conceptosConAcierto}</div>💡 Ideas dominadas</div>
      <div class="stat-card"><div class="stat-number">${Math.round((totalAciertos/(totalAciertos+totalFallos+0.001))*100)}%</div>📊 Tasa éxito</div>
    `;
  }

  function renderListado(slot = currentSlotFilter, filtro = "") {
    const container = document.getElementById("conceptosListadoContainer");
    container.innerHTML = "";
    const filtroLower = filtro.toLowerCase();
    for (let c of vocabularioData) {
      const id = c[0];
      const idea = obtenerTexto(c, 'palabra');
      const descripcion = obtenerTexto(c, 'definicion');
      const prog = progreso[id] || { aciertos: 0, fallos: 0 };
      const ideaSlot = c[5];
      if (slot !== "all" && ideaSlot !== slot) continue;
      if (filtro && !idea.toLowerCase().includes(filtroLower) && !descripcion.toLowerCase().includes(filtroLower)) continue;
      const div = document.createElement("div");
      div.className = "concepto-item";
      div.innerHTML = `<div class="concepto-titulo">
                         ${id}. ${idea}
                         <span class="slot-badge ${getSlotClass(ideaSlot)}">${getSlotText(ideaSlot)}</span>
                       </div>
                       <div class="concepto-desc">💡 ${descripcion}</div>
                       <span class="badge-progreso">✅ ${prog.aciertos} aciertos · ❌ ${prog.fallos} fallos</span>`;
      container.appendChild(div);
    }
  }

  // Función para obtener un ítem aleatorio según el filtro de franja
  function getRandomItemBySlot() {
    let filtered = vocabularioData;
    if (currentSlotFilter !== "all") {
      filtered = vocabularioData.filter(item => item[5] === currentSlotFilter);
    }
    if (filtered.length === 0) filtered = vocabularioData;
    const randomIndex = Math.floor(Math.random() * filtered.length);
    return filtered[randomIndex];
  }

  function modoOrdenarPalabras() {
    const item = getRandomItemBySlot();

    for (let i = shuffledPalabras.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffledPalabras[i], shuffledPalabras[j]] = [shuffledPalabras[j], shuffledPalabras[i]];
    }
    selectedOrder = [];

        });
      });
      document.getElementById("resetBtn").onclick = () => {
        shuffledPalabras = [...currentOrdenarPalabras];
        for (let i = shuffledPalabras.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffledPalabras[i], shuffledPalabras[j]] = [shuffledPalabras[j], shuffledPalabras[i]];
        }
        selectedOrder = [];
        renderUI();
      };
      document.getElementById("comprobarBtn").onclick = () => {
        const ordenUsuario = selectedOrder.join(" ");
        if (ordenUsuario === ordenarRespuestaCorrecta) {
          document.getElementById("feedbackMsg").innerHTML = "<span style='color:#27ae60'>✅ ¡Correcto! Idea ordenada correctamente.</span>";
          registrarResultado(currentCardId, true);
          setTimeout(() => modoOrdenarPalabras(), 1500);
        } else {
          document.getElementById("feedbackMsg").innerHTML = `<span style='color:#e67e22'>❌ Incorrecto. La idea correcta es: "${ordenarRespuestaCorrecta}"</span>`;
          registrarResultado(currentCardId, false);
          setTimeout(() => modoOrdenarPalabras(), 2000);
        }
        document.getElementById("comprobarBtn").disabled = true;
        setTimeout(() => { if(document.getElementById("comprobarBtn")) document.getElementById("comprobarBtn").disabled = false; }, 2000);
      };
      document.getElementById("siguienteBtn").onclick = () => modoOrdenarPalabras();
    };
    renderUI();
  }

  function modoEspEng() {
    const item = getRandomItemBySlot();
    currentCardId = item[0];
    const direction = Math.random() < 0.5 ? "esp2eng" : "eng2esp";
    const [pregunta, respuestaCorrecta] = direction === "esp2eng" ? [item[1], item[2]] : [item[2], item[1]];
    const directionText = direction === "esp2eng" ? "🇪🇸 → 🇬🇧 Español a Inglés" : "🇬🇧 → 🇪🇸 English to Spanish";
    const slotClass = getSlotClass(item[5]);
    const slotText = getSlotText(item[5]);
    
    practicaDiv.innerHTML = `
      <div class="flashcard">
        <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 0.5rem;">
          <span class="slot-badge ${slotClass}">${slotText}</span>
        </div>
        <div class="translation-direction">${directionText}</div>
        <div class="pregunta">📝 <strong>${pregunta}</strong></div>
        <input type="text" id="respuestaInput" placeholder="Escribe la traducción / Type the translation...">
        <button id="comprobarBtn" class="btn btn-primary">✓ Comprobar</button>
        <div id="feedbackMsg" style="margin:1rem 0; font-weight:bold;"></div>
        <button id="siguienteBtn" class="btn">⏩ Siguiente idea</button>
        <p id="infoProgresoCard" style="margin-top:0.8rem;">📊 Idea ${currentCardId} · ✅ ${progreso[currentCardId]?.aciertos||0} aciertos · ❌ ${progreso[currentCardId]?.fallos||0} fallos</p>
      </div>
    `;
    
    document.getElementById("comprobarBtn").onclick = () => {
      const userAnswer = document.getElementById("respuestaInput").value.trim().toLowerCase();
      const correct = respuestaCorrecta.toLowerCase();
      const isCorrect = userAnswer === correct;
      const feedback = document.getElementById("feedbackMsg");
      if (isCorrect) {
        feedback.innerHTML = `<span style='color:#27ae60'>✅ ¡Correcto! "${respuestaCorrecta}"</span>`;
        registrarResultado(currentCardId, true);
      } else {
        feedback.innerHTML = `<span style='color:#e67e22'>❌ Incorrecto. La respuesta correcta es: "${respuestaCorrecta}"</span>`;
        registrarResultado(currentCardId, false);
      }
      document.getElementById("comprobarBtn").disabled = true;
      setTimeout(() => { document.getElementById("comprobarBtn").disabled = false; }, 1500);
    };
    document.getElementById("siguienteBtn").onclick = () => modoEspEng();
  }

  function setPracticeMode(mode) {
    currentPracticeMode = mode;
    document.querySelectorAll(".modo-btn").forEach(btn => btn.classList.remove("active"));
    if (mode === "traduccion_directa") document.getElementById("modoTraduccionDirecta").classList.add("active");
    if (mode === "traduccion_inversa") document.getElementById("modoTraduccionInversa").classList.add("active");
    if (mode === "ordenar") document.getElementById("modoOrdenar").classList.add("active");
    if (mode === "esp_eng") document.getElementById("modoEspEng").classList.add("active");
    
    if (mode === "traduccion_directa") modoTraduccionDirecta();
    else if (mode === "traduccion_inversa") modoTraduccionInversa();
    else if (mode === "ordenar") modoOrdenarPalabras();
    else if (mode === "esp_eng") modoEspEng();
  }

  function setLanguage(lang) {
    currentLang = lang;
    document.getElementById("langEsBtn").classList.toggle("active", lang === 'es');
    document.getElementById("langEnBtn").classList.toggle("active", lang === 'en');
    document.getElementById("langBothBtn").classList.toggle("active", lang === 'both');
    document.getElementById("progressTitle").innerHTML = lang === 'es' ? "📈 Progreso en ideas C1 - AMB" : 
                                                         (lang === 'en' ? "📈 C1 Ideas Progress - AMB" : "📈 Progreso / Progress");
    const placeholder = document.querySelector("#listado input");
    if (placeholder) {
      placeholder.placeholder = lang === 'es' ? "🔍 Buscar idea..." :
                                (lang === 'en' ? "🔍 Search idea..." : "🔍 Buscar / Search...");
    }
    renderListado(currentSlotFilter, currentFiltroTexto);
    setPracticeMode(currentPracticeMode);
  }

  function initUI() {
    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const viewId = btn.getAttribute("data-view");
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active-view"));
        document.getElementById(viewId).classList.add("active-view");
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        if (viewId === "listado") renderListado(currentSlotFilter, currentFiltroTexto);
        if (viewId === "dashboard") renderDashboard();
        if (viewId === "practica") setPracticeMode(currentPracticeMode);
      });
    });
    
    document.getElementById("modoTraduccionDirecta").addEventListener("click", () => setPracticeMode("traduccion_directa"));
    document.getElementById("modoTraduccionInversa").addEventListener("click", () => setPracticeMode("traduccion_inversa"));
    document.getElementById("modoOrdenar").addEventListener("click", () => setPracticeMode("ordenar"));
    document.getElementById("modoEspEng").addEventListener("click", () => setPracticeMode("esp_eng"));
    
    document.getElementById("resetProgresoBtn").addEventListener("click", () => {
      if (confirm("¿Reiniciar todo el progreso? Se perderán aciertos y fallos. / Reset all progress?")) {
        for (let i = 1; i <= 100; i++) progreso[i] = { aciertos: 0, fallos: 0 };
        guardarProgreso();
        renderDashboard();
        renderListado(currentSlotFilter, currentFiltroTexto);
        setPracticeMode(currentPracticeMode);
      }
    });
    
    const filtroInput = document.getElementById("filtroListado");
    filtroInput.addEventListener("input", (e) => {
      currentFiltroTexto = e.target.value;
      renderListado(currentSlotFilter, currentFiltroTexto);
    });
    
    document.querySelectorAll(".slot-filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const slot = btn.getAttribute("data-slot");
        currentSlotFilter = slot;
        document.querySelectorAll(".slot-filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderListado(currentSlotFilter, currentFiltroTexto);
      });
    });
    
    document.getElementById("langEsBtn").addEventListener("click", () => setLanguage('es'));
    document.getElementById("langEnBtn").addEventListener("click", () => setLanguage('en'));
    document.getElementById("langBothBtn").addEventListener("click", () => setLanguage('both'));
  }

  window.addEventListener("DOMContentLoaded", () => {
    cargarProgreso();
    renderDashboard();
    renderListado("all", "");
    initUI();
    setPracticeMode("traduccion_directa");
  });
</script>
</body>
</html>
