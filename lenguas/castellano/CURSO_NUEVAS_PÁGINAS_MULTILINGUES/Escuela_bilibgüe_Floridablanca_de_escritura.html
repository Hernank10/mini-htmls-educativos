let currentLang = 'es';
let userAnswers = {}; // {id: {answer:..., correct: true/false}}

const exerciseListEl = document.getElementById('exerciseList');
const progressCount = document.getElementById('progressCount');

function renderExercises(list){
  exerciseListEl.innerHTML = '';
  list.forEach(ex => {
    const card = document.createElement('div');
    card.className = 'card exercise-card';
    card.id = 'ex-'+ex.id;

    const body = document.createElement('div');
    body.className = 'card-body';

    // Title
    const title = document.createElement('h5');
    title.className = 'card-title';
    title.textContent = `Ejercicio ${ex.id} — ${ex.type}`;
    body.appendChild(title);

    // Prompt (depends on type)
    const prompt = document.createElement('p');
    prompt.className = 'card-text';
    if(ex.type === 'order'){
      prompt.innerHTML = `<strong>${currentLang === 'es' ? ex.es.prompt_es : ex.en.prompt_en}</strong>`;
    } else if(ex.type === 'choose'){
      prompt.innerHTML = `<strong>${currentLang === 'es' ? ex.es : ex.en}</strong>`;
    } else if(ex.type === 'fill' || ex.type === 'translate'){
      prompt.innerHTML = `<strong>${currentLang === 'es' ? ex.es : ex.en}</strong>`;
    }
    body.appendChild(prompt);

    // Controls by type
    const controlDiv = document.createElement('div');

    if(ex.type === 'choose'){
      ex.options.forEach((opt,i)=>{
        const div = document.createElement('div');
        div.className = 'form-check';
        const input = document.createElement('input');
        input.className = 'form-check-input';
        input.type = 'radio';
        input.name = 'choice-'+ex.id;
        input.id = `choice-${ex.id}-${i}`;
        input.value = opt;
        input.addEventListener('change', ()=>{ saveAnswer(ex.id, input.value); });
        const label = document.createElement('label');
        label.className = 'form-check-label';
        label.htmlFor = input.id;
        label.textContent = opt;
        div.appendChild(input); div.appendChild(label);
        controlDiv.appendChild(div);
      });
    } else if(ex.type === 'order'){
      // create draggable buttons or simple select order controls
      const words = currentLang === 'es' ? ex.es.words.slice() : ex.en.words.slice();
      const container = document.createElement('div');
      container.className = 'd-flex flex-wrap gap-2 mb-2';
      words.forEach((w, idx)=>{
        const btn = document.createElement('button');
        btn.className = 'btn btn-outline-secondary btn-sm word-btn';
        btn.textContent = w;
        btn.dataset.index = idx;
        btn.addEventListener('click', ()=>{
          // append to answer area
          const ansArea = card.querySelector('.order-answer');
          const span = document.createElement('span');
          span.className = 'badge bg-secondary me-1';
          span.textContent = w;
          span.addEventListener('click', ()=>{ span.remove(); updateOrderAnswer(ex.id); });
          ansArea.appendChild(span);
          updateOrderAnswer(ex.id);
        });
        container.appendChild(btn);
      });
      controlDiv.appendChild(container);
      const ansLabel = document.createElement('div');
      ansLabel.className = 'order-answer mb-2';
      controlDiv.appendChild(ansLabel);
      const btnClear = document.createElement('button');
      btnClear.className = 'btn btn-sm btn-outline-danger';
      btnClear.textContent = 'Limpiar orden';
      btnClear.addEventListener('click', ()=>{ card.querySelector('.order-answer').innerHTML=''; saveAnswer(ex.id,''); });
      controlDiv.appendChild(btnClear);
    } else if(ex.type === 'fill' || ex.type === 'translate'){
      const textarea = document.createElement('textarea');
      textarea.className = 'form-control mb-2';
      textarea.rows = 2;
      textarea.placeholder = currentLang === 'es' ? 'Escribe tu respuesta aquí...' : 'Type your answer here...';
      textarea.addEventListener('input', ()=>{ saveAnswer(ex.id, textarea.value); });
      controlDiv.appendChild(textarea);
    }

    body.appendChild(controlDiv);

    // Feedback area
    const feedback = document.createElement('div');
    feedback.className = 'mt-2 feedback text-muted';
    body.appendChild(feedback);

    // Buttons: check / show answer
    const btnGroup = document.createElement('div');
    btnGroup.className = 'mt-3';
    const btnCheck = document.createElement('button');
    btnCheck.className = 'btn btn-outline-success btn-sm me-2';
    btnCheck.textContent = currentLang === 'es' ? 'Verificar' : 'Check';
    btnCheck.addEventListener('click', ()=>{ checkExercise(ex.id); });
    const btnShow = document.createElement('button');
    btnShow.className = 'btn btn-outline-secondary btn-sm';
    btnShow.textContent = currentLang === 'es' ? 'Mostrar respuesta' : 'Show answer';
    btnShow.addEventListener('click', ()=>{ showAnswer(ex.id); });
    btnGroup.appendChild(btnCheck); btnGroup.appendChild(btnShow);
    body.appendChild(btnGroup);

    card.appendChild(body);
    exerciseListEl.appendChild(card);

    // restore previous answer if exists
    if(userAnswers[ex.id]){
      const val = userAnswers[ex.id].answer;
      if(ex.type === 'fill' || ex.type === 'translate'){
        const ta = card.querySelector('textarea'); if(ta) ta.value = val;
      }
      if(ex.type === 'choose'){
        const inputs = card.querySelectorAll('input[type=radio]'); inputs.forEach(i=>{ if(i.value===val) i.checked=true; });
      }
      if(ex.type === 'order'){
        const ansArea = card.querySelector('.order-answer'); ansArea.innerHTML=''; if(val){
          val.split(' ').forEach(w=>{ if(w.trim()){ const span = document.createElement('span'); span.className='badge bg-secondary me-1'; span.textContent=w; span.addEventListener('click', ()=>{ span.remove(); updateOrderAnswer(ex.id); }); ansArea.appendChild(span); }});
        }
      }
      renderFeedback(ex.id);
    }
  });
  updateProgress();
}

function saveAnswer(id, value){
  userAnswers[id] = userAnswers[id] || {};
  userAnswers[id].answer = (value||'').toString().trim();
  userAnswers[id].checked = false;
  renderFeedback(id);
  updateProgress();
}

function updateOrderAnswer(id){
  const card = document.getElementById('ex-'+id);
  const ans = Array.from(card.querySelectorAll('.order-answer span')).map(s=>s.textContent).join(' ');
  saveAnswer(id, ans);
}

function normalize(s){ return (s||'').toString().trim().toLowerCase(); }

function checkExercise(id){
  const ex = exercises.find(e=>e.id===id);
  const ua = userAnswers[id] && userAnswers[id].answer ? normalize(userAnswers[id].answer) : '';
  let correct = false;
  const correctMsgEl = document.getElementById('ex-'+id).querySelector('.feedback');

  if(ex.type === 'choose'){
    correct = ua === normalize(ex.answer) || (Array.isArray(ex.answer) && ex.answer.map(a=>normalize(a)).includes(ua));
  } else if(ex.type === 'order'){
    const target = normalize(currentLang==='es'?ex.answer_es:ex.answer_en);
    correct = ua === normalize(target);
  } else if(ex.type === 'fill' || ex.type === 'translate'){
    // allow partial matches and multiple acceptable answers: we'll check if user answer contains key words from expected
    const expected = (currentLang==='es'?ex.answer_es:ex.answer_en).toString().toLowerCase();
    if(expected.includes('(') || expected.includes('/')){
      // complex expected: treat as accept anything that contains main verb or keyword
      const keywords = expected.replace(/[()\/]*/g,'').split(' ').slice(0,3).map(s=>s.replace(/[^a-záéíóúñü]/g,''));
      correct = keywords.every(k=>k?ua.includes(k):true);
    } else if(expected.length<20 && expected.includes(' ')==false){
      correct = ua === normalize(expected);
    } else {
      // open answers: accept if at least 50% words match
      const aWords = ua.split(' ').filter(Boolean);
      const eWords = expected.split(' ').filter(Boolean);
      const matches = eWords.filter(w=>aWords.includes(w)).length;
      correct = eWords.length? (matches / eWords.length) >= 0.5 : ua.length>0;
    }
  }

  userAnswers[id].checked = true;
  userAnswers[id].correct = correct;
  renderFeedback(id);
  updateProgress();
}

function renderFeedback(id){
  const ex = exercises.find(e=>e.id===id);
  const card = document.getElementById('ex-'+id);
  const fb = card.querySelector('.feedback');
  card.classList.remove('correct','wrong');
  if(userAnswers[id] && userAnswers[id].checked){
    if(userAnswers[id].correct){ fb.innerHTML = `<span class="text-success">Correcto</span>`; card.classList.add('correct'); }
    else { fb.innerHTML = `<span class="text-danger">Incorrecto o incompleto</span>`; card.classList.add('wrong'); }
  } else if(userAnswers[id] && userAnswers[id].answer){
    fb.innerHTML = `<span class="text-muted">Respuesta guardada (sin verificar)</span>`;
  } else { fb.innerHTML = `<span class="text-muted">Sin respuesta</span>`; }
}

function showAnswer(id){
  const ex = exercises.find(e=>e.id===id);
  const card = document.getElementById('ex-'+id);
  const fb = card.querySelector('.feedback');
  const correct = currentLang==='es' ? ex.answer_es || ex.answer : ex.answer_en || ex.answer;
  fb.innerHTML = `<strong>Respuesta ejemplo:</strong> <pre>${correct}</pre>`;
}

function updateProgress(){
  const total = exercises.length;
  const answered = Object.keys(userAnswers).length;
  const checkedCorrect = Object.values(userAnswers).filter(v=>v.correct).length;
  progressCount.textContent = `${answered}/${total} — Aciertos verificados: ${checkedCorrect}`;
}

// Filtering and search
function applyFilters(){
  const type = document.getElementById('filterType').value;
  const term = document.getElementById('searchTerm').value.trim().toLowerCase();
  let list = exercises.slice();
  if(type !== 'all') list = list.filter(e=>e.type===type);
  if(term){
    list = list.filter(e=>{
      const text = (typeof e.es === 'string' ? e.es : JSON.stringify(e.es)).toLowerCase();
      const textEn = (typeof e.en === 'string' ? e.en : JSON.stringify(e.en)).toLowerCase();
      return text.includes(term) || textEn.includes(term);
    });
  }
  renderExercises(list);
}

// Language toggle
document.getElementById('btnToggleLang').addEventListener('click', ()=>{
  currentLang = currentLang === 'es' ? 'en' : 'es';
  document.documentElement.lang = currentLang === 'es' ? 'es' : 'en';
  document.getElementById('btnToggleLang').textContent = currentLang === 'es' ? 'ES / EN' : 'EN / ES';
  applyFilters();
});

// Buttons
document.getElementById('btnApply').addEventListener('click', applyFilters);
document.getElementById('btnReset').addEventListener('click', ()=>{ document.getElementById('filterType').value='all'; document.getElementById('searchTerm').value=''; renderExercises(exercises); });
document.getElementById('btnCheckAll').addEventListener('click', ()=>{ exercises.forEach(e=>{ checkExercise(e.id); }); alert('Revisión completada. Revisa retroalimentación en cada ejercicio.'); });
document.getElementById('btnShowResults').addEventListener('click', ()=>{
  const total = exercises.length;
  const answered = Object.keys(userAnswers).length;
  const correct = Object.values(userAnswers).filter(v=>v.correct).length;
  const message = `Respondidos: ${answered}/${total}\nAciertos verificados: ${correct}`;
  alert(message);
});

// initial render
renderExercises(exercises);
</script>
</body>
