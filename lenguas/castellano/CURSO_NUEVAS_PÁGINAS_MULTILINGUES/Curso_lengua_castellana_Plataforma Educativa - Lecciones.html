<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Plataforma Educativa - Lecciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">EducaLingua</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="#" id="nav-lessons">Lecciones</a></li>
        <li class="nav-item"><a class="nav-link" href="#" id="nav-games">Juegos</a></li>
        <li class="nav-item"><a class="nav-link" href="#" id="nav-admin">Panel Profesor</a></li>
      </ul>
      <div class="d-flex">
        <select id="lang-select" class="form-select form-select-sm me-2"></select>
        <button class="btn btn-outline-light btn-sm" id="btn-login">Iniciar Sesión</button>
      </div>
    </div>
  </div>
</nav>

<main class="container my-4">
  <div id="alert-area"></div>

  <!-- Sección Lecciones -->
  <section id="section-lessons">
    <h3 id="title">Lecciones</h3>
    <div class="row">
      <div class="col-md-8">
        <div id="lessons-list" class="list-group"></div>
      </div>
      <div class="col-md-4">
        <h5>Detalle</h5>
        <div id="lesson-detail" class="card p-3">Selecciona una lección.</div>
      </div>
    </div>
  </section>

  <!-- Sección Juegos -->
  <section id="section-games" class="d-none">
    <h3>Juegos Lingüísticos</h3>
    <div class="row">
      <div class="col-md-6">
        <button class="btn btn-outline-primary mb-2" id="open-synonyms">Sinónimos (Web)</button>
        <button class="btn btn-outline-primary mb-2" id="open-truefalse">Verdadero/Falso</button>
        <button class="btn btn-outline-primary mb-2" id="open-proverbs">Proverbios</button>
      </div>
      <div class="col-md-6">
        <h5>Juego embebido</h5>
        <div id="game-frame" style="min-height:220px;"></div>
      </div>
    </div>
  </section>

  <!-- Sección Admin -->
  <section id="section-admin" class="d-none">
    <h3>Panel del Profesor</h3>
    <p>Accede al panel (requiere login de profesor).</p>
    <a id="link-admin" class="btn btn-warning" href="/admin" target="_blank">Abrir Panel</a>
  </section>
</main>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content p-3">
      <h5>Iniciar sesión</h5>
      <div class="mb-2"><input id="input-user" class="form-control" placeholder="Usuario"></div>
      <div class="mb-2"><input id="input-pass" type="password" class="form-control" placeholder="Contraseña"></div>
      <div class="d-flex justify-content-end">
        <button class="btn btn-secondary btn-sm me-2" data-bs-dismiss="modal">Cerrar</button>
        <button id="btn-do-login" class="btn btn-primary btn-sm">Entrar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
