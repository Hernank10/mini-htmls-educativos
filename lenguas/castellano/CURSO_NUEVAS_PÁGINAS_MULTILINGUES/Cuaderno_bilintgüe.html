<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Innovación Bilingüe</title>
    <!-- Carga de Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6hsYi7b1yW01pX4gY8eD9Kq46gHj/P2dD3B" crossorigin="anonymous">
    
    <style>
        /* Estilos personalizados para el reglón de caligrafía y otros */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa; /* Gris claro de Bootstrap */
        }
        .container {
            max-width: 800px;
        }
        .reglon-container {
            position: relative;
            height: 120px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .reglon-line {
            position: absolute;
            left: 10px;
            right: 10px;
            height: 1px;
        }
        /* Línea superior (Mayúsculas) */
        .reglon-line.top {
            top: 25px;
            background-color: #007bff; /* Azul primario */
        }
        /* Línea central (Guía punteada de minúsculas) */
        .reglon-line.middle {
            top: 60px;
            background-image: linear-gradient(to right, gray 50%, transparent 50%);
            background-size: 10px 1px;
            height: 1px;
        }
        /* Línea inferior (Base) */
        .reglon-line.bottom {
            top: 95px;
            background-color: #007bff;
        }
        .modelo-caligrafia {
            position: absolute;
            top: 30px;
            left: 20px;
            font-size: 3rem; /* Tamaño grande para simular trazo */
            opacity: 0.3; /* Semitransparente como guía */
            user-select: none;
            font-family: monospace; /* Fuente de trazo simple */
            color: #6c757d; /* Gris oscuro */
        }
        .text-feedback {
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <header class="bg-primary text-white text-center py-3 mb-4 shadow-sm">
        <div class="container">
            <h1 class="h3">Centro de Innovación Bilingüe</h1>
            <p id="app-subtitle" class="lead mb-0"></p>
        </div>
    </header>

    <main class="container">
        <!-- El contenido de la aplicación será renderizado aquí -->
        <div id="app">
            <!-- Contenido cargado por JavaScript -->
        </div>
    </main>

    <!-- Carga de Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        // ==============================================================================
        // 1. ARQUITECTURA DE CONTENIDO Y LÓGICA (Adaptada de Python a JavaScript)
        // ==============================================================================

        const appElement = document.getElementById('app');
        const subtitleElement = document.getElementById('app-subtitle');

        let idioma = 'ES'; // Idioma por defecto
        let umbralPrecision = 90;
        let currentExercise = null;
        let palabraModelo = '';

        // Definición de Estructura de Contenido
        const EJERCICIOS_CRB = {
            'CALIGRAFIA_ES': ["Caligrafía", "Redacción", "Aprendizaje", "Sintaxis", "Bilingüe"],
            'CALIGRAFIA_EN': ["Calligraphy", "Composition", "Learning", "Syntax", "Bilingual"],

            'GRAMATICA_ES': [
                {'pregunta': "Corrige el sujeto: 'Los niño corren rápido.'", 'respuesta_correcta': "Los niños corren rápido.", 'tipo': 'Sujeto/Verbo'},
                {'pregunta': "Completa con un nexo concesivo: 'Me gusta la película, ___ el final no fue bueno.'", 'respuesta_correcta': "aunque", 'tipo': 'Oración Compuesta'},
                {'pregunta': "Reescribe con tilde: 'Mi papa me dio un regalo.'", 'respuesta_correcta': "Mi papá me dio un regalo.", 'tipo': 'Acentuación'},
                {'pregunta': "Transforma a pasiva perifrástica: 'La lluvia inundó la ciudad.'", 'respuesta_correcta': "La ciudad fue inundada por la lluvia.", 'tipo': 'Voz Pasiva'},
                {'pregunta': "Forma correcta del verbo 'ser' en presente simple (yo):", 'respuesta_correcta': "soy", 'tipo': 'Verbo Regular'},
            ],
            'GRAMATICA_EN': [
                {'pregunta': "Correct the verb tense: 'She go to the store yesterday.'", 'respuesta_correcta': "She went to the store yesterday.", 'tipo': 'Verb Tense'},
                {'pregunta': "Complete with a coordinating conjunction: 'I wanted to stay, ___ she had to leave.'", 'respuesta_correcta': "but", 'tipo': 'Compound Sentence'},
                {'pregunta': "Rewrite using the possessive form: 'The book of John.'", 'respuesta_correcta': "John's book.", 'tipo': 'Possessive'},
                {'pregunta': "Identify the subject-verb agreement error: 'The list of items are correct.'", 'respuesta_correcta': "are", 'tipo': 'Agreement'},
                {'pregunta': "Choose the correct preposition: 'The cat is ___ the table.' (on/at/in)", 'respuesta_correcta': "on", 'tipo': 'Preposition'},
            ]
        };

        const TEXTOS = {
            'ES': {
                'subtitulo': "Autoaprendizaje de Reglas de la Lengua Castellana e Inglesa",
                'caligrafia': "Práctica de Caligrafía Digital (Simulación de Trazo)",
                'gramatica': "Ejercicios de Gramática y Sintaxis",
                'menu_bienvenida': "Selecciona una modalidad de práctica para iniciar tu autoaprendizaje:",
                'instruccion_caligrafia': "Instrucción: Escribe la palabra modelo con precisión absoluta para aprobar la caligrafía digital.",
                'instruccion_gramatica': "Instrucción: Escribe tu respuesta o corrección en el campo de abajo.",
                'btn_verificar': "Verificar",
                'btn_menu': "Volver al Menú",
                'btn_siguiente': "Siguiente Ejercicio",
                'aprobado': (p) => `¡Caligrafía Aprobada! Precisión: ${p}%`,
                'intenta': (u) => `Intenta de nuevo. Necesitas ${u}% de precisión.`,
                'correcto': "¡CORRECTO! Estructura dominada. 🌟",
                'incorrecto': (r) => `INCORRECTO. La respuesta correcta es: ${r}`,
                'precisión': "Precisión requerida:",
                'btn_cambiar_idioma': "Switch to English (EN)"
            },
            'EN': {
                'subtitulo': "Self-Learning for Spanish and English Language Rules",
                'caligrafia': "Digital Calligraphy Practice (Stroke Simulation)",
                'gramatica': "Grammar and Syntax Exercises",
                'menu_bienvenida': "Select a practice mode to start your self-learning:",
                'instruccion_caligrafia': "Instruction: Type the model word with absolute accuracy to pass digital calligraphy.",
                'instruccion_gramatica': "Instruction: Write your answer or correction in the field below.",
                'btn_verificar': "Verify",
                'btn_menu': "Return to Menu",
                'btn_siguiente': "Next Exercise",
                'aprobado': (p) => `Calligraphy Approved! Accuracy: ${p}%`,
                'intenta': (u) => `Try again. You need ${u}% accuracy.`,
                'correcto': "CORRECT! Structure mastered. 🌟",
                'incorrecto': (r) => `INCORRECT. The correct answer is: ${r}`,
                'precisión': "Required Accuracy:",
                'btn_cambiar_idioma': "Cambiar a Español (ES)"
            }
        };

        // --- LÓGICA DE CONTROL ---

        function obtenerTexto(clave) {
            return TEXTOS[idioma][clave] || `[${clave} Missing]`;
        }

        function setIdioma(newIdioma) {
            idioma = newIdioma;
            subtitleElement.textContent = obtenerTexto('subtitulo');
            renderMenu();
        }

        /**
         * Calcula el porcentaje de precisión caracter a caracter.
         */
        function calcularPrecision(target, user_input) {
            const minLen = Math.min(target.length, user_input.length);
            let correctChars = 0;
            const targetLower = target.toLowerCase();
            const userInputLower = user_input.toLowerCase();

            for (let i = 0; i < minLen; i++) {
                if (targetLower[i] === userInputLower[i]) {
                    correctChars++;
                }
            }

            // La precisión se basa en la longitud del objetivo
            const precision = (correctChars / target.length) * 100;
            return parseFloat(precision.toFixed(2));
        }

        // --- VISTAS / RENDERING ---

        /** Renderiza la vista de selección de idioma y el menú inicial. */
        function renderIdiomaSelection() {
            appElement.innerHTML = `
                <div class="card shadow-lg p-4 mb-4">
                    <h2 class="h4 card-title text-center mb-4">Selecciona el Idioma / Select Language</h2>
                    <div class="d-grid gap-3">
                        <button class="btn btn-primary btn-lg" onclick="setIdioma('ES')">Español (ES)</button>
                        <button class="btn btn-primary btn-lg" onclick="setIdioma('EN')">English (EN)</button>
                    </div>
                </div>
            `;
        }
        
        /** Renderiza el menú principal. */
        function renderMenu() {
            subtitleElement.textContent = obtenerTexto('subtitulo');
            appElement.innerHTML = `
                <div class="card shadow-lg p-4 mb-4">
                    <div class="card-body text-center">
                        <h2 class="h4 card-title">${obtenerTexto('menu_bienvenida')}</h2>
                        <div class="d-grid gap-3 mt-4">
                            <button class="btn btn-success btn-lg" onclick="renderCaligrafia()">
                                ${obtenerTexto('caligrafia')}
                            </button>
                            <button class="btn btn-info btn-lg" onclick="renderGramatica()">
                                ${obtenerTexto('gramatica')}
                            </button>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <button class="btn btn-outline-secondary" onclick="renderIdiomaSelection()">
                        ${obtenerTexto('btn_cambiar_idioma')}
                    </button>
                </div>
            `;
        }
        
        /** Renderiza la práctica de caligrafía. */
        function renderCaligrafia() {
            const listaPalabras = EJERCICIOS_CRB[`CALIGRAFIA_${idioma}`];
            palabraModelo = listaPalabras[Math.floor(Math.random() * listaPalabras.length)];

            appElement.innerHTML = `
                <div class="card shadow-lg p-4 mb-4">
                    <h2 class="h4 card-title text-center">${obtenerTexto('caligrafia')}</h2>
                    <p class="text-muted text-center">${obtenerTexto('instruccion_caligrafia')}</p>
                    
                    <div class="reglon-container">
                        <div class="reglon-line top"></div>
                        <div class="reglon-line middle"></div>
                        <div class="reglon-line bottom"></div>
                        <div class="modelo-caligrafia">${palabraModelo}</div>
                    </div>

                    <form id="caligrafia-form">
                        <input type="text" id="caligrafia-input" class="form-control form-control-lg" 
                                placeholder="Escribe la palabra aquí..." autofocus>
                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn btn-success">
                                ${obtenerTexto('btn_verificar')}
                            </button>
                        </div>
                    </form>
                    
                    <div id="caligrafia-feedback" class="text-feedback d-none text-center"></div>
                </div>
                <div class="text-center">
                    <button class="btn btn-secondary mt-3" onclick="renderMenu()">
                        ${obtenerTexto('btn_menu')}
                    </button>
                </div>
            `;
            
            document.getElementById('caligrafia-form').addEventListener('submit', function(e) {
                e.preventDefault();
                verificarCaligrafia();
            });
        }
        
        /** Renderiza la práctica de gramática. */
        function renderGramatica() {
            const ejercicios = EJERCICIOS_CRB[`GRAMATICA_${idioma}`];
            currentExercise = ejercicios[Math.floor(Math.random() * ejercicios.length)];

            appElement.innerHTML = `
                <div class="card shadow-lg p-4 mb-4">
                    <h2 class="h4 card-title text-center">${obtenerTexto('gramatica')}</h2>
                    
                    <div class="card mb-3 bg-light p-3">
                        <p class="mb-1 text-primary"><strong>[${currentExercise.tipo}]</strong></p>
                        <h5 class="card-text">${currentExercise.pregunta}</h5>
                    </div>

                    <p class="text-muted text-center">${obtenerTexto('instruccion_gramatica')}</p>

                    <form id="gramatica-form">
                        <input type="text" id="gramatica-input" class="form-control form-control-lg" 
                                placeholder="Tu respuesta/corrección..." autofocus>
                        <div class="d-grid gap-2 mt-3">
                            <button type="submit" class="btn btn-info">
                                ${obtenerTexto('btn_verificar')}
                            </button>
                        </div>
                    </form>
                    
                    <div id="gramatica-feedback" class="text-feedback d-none text-center"></div>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <button class="btn btn-secondary mt-3" onclick="renderMenu()">
                        ${obtenerTexto('btn_menu')}
                    </button>
                    <button id="siguiente-btn" class="btn btn-primary mt-3 d-none" onclick="renderGramatica()">
                        ${obtenerTexto('btn_siguiente')}
                    </button>
                </div>
            `;
            
            document.getElementById('gramatica-form').addEventListener('submit', function(e) {
                e.preventDefault();
                verificarGramatica();
            });
        }

        // --- LÓGICA DE VERIFICACIÓN ---

        function verificarCaligrafia() {
            const inputElement = document.getElementById('caligrafia-input');
            const feedbackElement = document.getElementById('caligrafia-feedback');
            const userInput = inputElement.value.trim();
            const target = palabraModelo;
            
            const precision = calcularPrecision(target, userInput);
            
            feedbackElement.classList.remove('d-none', 'bg-success', 'bg-danger');

            if (precision >= umbralPrecision) {
                const msg = obtenerTexto('aprobado')(precision);
                feedbackElement.textContent = msg;
                feedbackElement.classList.add('bg-success', 'text-white');
                // Carga el siguiente ejercicio automáticamente
                setTimeout(renderCaligrafia, 1500); 
            } else {
                const msg = obtenerTexto('intenta')(umbralPrecision);
                feedbackElement.textContent = `${msg} ${obtenerTexto('precisión')} ${precision}%`;
                feedbackElement.classList.add('bg-danger', 'text-white');
                inputElement.value = ''; // Limpia para reintento
                inputElement.focus();
            }
        }
        
        function verificarGramatica() {
            const inputElement = document.getElementById('gramatica-input');
            const feedbackElement = document.getElementById('gramatica-feedback');
            const siguienteBtn = document.getElementById('siguiente-btn');
            
            const userInput = inputElement.value.trim();
            const respuestaCorrecta = currentExercise.respuesta_correcta;

            // Normalización para verificación
            const entradaNormalizada = userInput.toLowerCase().replace(/[.,!?]/g, '').trim();
            const correctaNormalizada = respuestaCorrecta.toLowerCase().replace(/[.,!?]/g, '').trim();
            
            feedbackElement.classList.remove('d-none', 'bg-success', 'bg-danger');
            
            // Deshabilita el input y el botón de verificar
            inputElement.disabled = true;
            document.querySelector('#gramatica-form button[type="submit"]').disabled = true;

            if (entradaNormalizada === correctaNormalizada) {
                const msg = obtenerTexto('correcto');
                feedbackElement.textContent = msg;
                feedbackElement.classList.add('bg-success', 'text-white');
                siguienteBtn.classList.remove('d-none');
            } else {
                const msg = obtenerTexto('incorrecto')(respuestaCorrecta);
                feedbackElement.textContent = msg;
                feedbackElement.classList.add('bg-danger', 'text-white');
                // Permite reintentar si el usuario lo desea, pero muestra la respuesta correcta
                siguienteBtn.classList.remove('d-none');
            }
        }

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', () => {
            renderIdiomaSelection();
        });
    </script>

</body>
</html>
