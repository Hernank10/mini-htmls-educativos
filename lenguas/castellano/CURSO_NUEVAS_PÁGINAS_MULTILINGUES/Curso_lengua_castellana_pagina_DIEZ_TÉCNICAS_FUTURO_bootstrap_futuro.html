<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aprender el Futuro en Español e Inglés</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background: #eaf2ff; }
        .categoria-card { border-radius: 1.5rem; }
        .hero { background: linear-gradient(135deg,#4d8cff,#8fb7ff); color:white; padding:4rem 1rem; border-radius:1rem; }
        .btn-main { background:#4d8cff; color:white; border-radius:1rem; }
        .btn-main:hover { background:#3a6fd6; }
        textarea { resize:none; }
    </style>
</head>
<body>

<div class="container my-4">
    <div class="hero text-center">
        <h1 class="fw-bold">Aprender el Futuro en Español e Inglés</h1>
        <p class="lead">Práctica bilingüe • Dictado • Voz • Gramática • Ejemplos</p>
    </div>

    <section class="my-5">
        <h2 class="text-center mb-4">10 Técnicas del Futuro</h2>
        <div class="row" id="categorias"></div>
    </section>

    <section class="my-5">
        <h2 class="text-center">Práctica interactiva</h2>
        <div class="card p-4 categoria-card shadow-sm">
            <label class="fw-bold">Frase a practicar:</label>
            <p id="fraseOriginal" class="fs-5"></p>

            <button class="btn btn-main my-2" onclick="leerFrase()">🔊 Escuchar</button>
            <button class="btn btn-secondary my-2" onclick="dictar()">🎤 Dictar por voz</button>

            <label class="fw-bold mt-4">Escribe o dicta tu traducción:</label>
            <textarea id="respuesta" class="form-control" rows="3"></textarea>
            
            <button class="btn btn-success mt-3" onclick="comprobar()">✔ Comprobar</button>
            <p id="resultado" class="mt-3 fs-5"></p>
        </div>
    </section>
</div>

<script>
const categorias = [
    {nombre:"Futuro simple", teoria:"Expresa acciones futuras claras.", ejemploES:"Estudiaré mañana.", ejemploEN:"I will study tomorrow."},
    {nombre:"Ir a + infinitivo", teoria:"Expresa intención inmediata.", ejemploES:"Voy a viajar este mes.", ejemploEN:"I am going to travel this month."},
    {nombre:"Presente con valor de futuro", teoria:"Eventos programados.", ejemploES:"Mañana tengo cita.", ejemploEN:"Tomorrow I have an appointment."},
    {nombre:"Obligación futura", teoria:"He de + infinitivo.", ejemploES:"He de estudiar más.", ejemploEN:"I must study more."},
    {nombre:"Deber + infinitivo", teoria:"Expresa deber en futuro.", ejemploES:"Debo viajar pronto.", ejemploEN:"I must travel soon."},
    {nombre:"Condicional con valor de futuro", teoria:"Probabilidad desde el pasado.", ejemploES:"Vendría mañana.", ejemploEN:"He would come tomorrow."},
    {nombre:"Futuro perifrástico modal", teoria:"Expresa posibilidad.", ejemploES:"Puede que llueva.", ejemploEN:"It may rain."},
    {nombre:"Futuro perfecto", teoria:"Acción futura anterior a otra.", ejemploES:"Habré llegado.", ejemploEN:"I will have arrived."},
    {nombre:"Oraciones temporales", teoria:"Presente con sentido futuro.", ejemploES:"Cuando termine, salgo.", ejemploEN:"When I finish, I leave."},
    {nombre:"Futuro de probabilidad", teoria:"Suposición.", ejemploES:"Serán las 10.", ejemploEN:"It is probably 10."}
];

let fraseActualES = "";
let fraseActualEN = "";

function cargarCategorias() {
    let html = '';
    categorias.forEach((c,i)=>{
        html += `
            <div class="col-md-6 col-lg-4 mb-3">
                <div class="card p-3 shadow-sm categoria-card">
                    <h4>${c.nombre}</h4>
                    <p>${c.teoria}</p>
                    <button class="btn btn-main" onclick="seleccionarCategoria(${i})">Practicar</button>
                </div>
            </div>
        `;
    });
    document.getElementById('categorias').innerHTML = html;
}

function seleccionarCategoria(i) {
    fraseActualES = categorias[i].ejemploES;
    fraseActualEN = categorias[i].ejemploEN;
    document.getElementById('fraseOriginal').innerHTML = fraseActualES;
    document.getElementById('resultado').innerHTML = "";
    document.getElementById('respuesta').value = "";
}

function leerFrase() {
    let u = new SpeechSynthesisUtterance(fraseActualES);
    u.lang = "es-ES";
    speechSynthesis.speak(u);
}

function dictar() {
    const rec = new webkitSpeechRecognition();
    rec.lang = "en-US";
    rec.onresult = (e)=>{
        document.getElementById('respuesta').value = e.results[0][0].transcript;
    }
    rec.start();
}

function comprobar() {
    let r = document.getElementById('respuesta').value.trim().toLowerCase();
    let correcto = fraseActualEN.toLowerCase();

    if (r === correcto) {
        document.getElementById('resultado').innerHTML = "<span class='text-success fw-bold'>✔ ¡Correcto!</span>";
    } else {
        document.getElementById('resultado').innerHTML = "<span class='text-danger fw-bold'>❌ Incorrecto.</span><br>Respuesta correcta: " + fraseActualEN;
    }
}

cargarCategorias();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
