<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LinguaMaestra — Plataforma Gramatical</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0d0f14; --surface:#161923; --surface2:#1e2330;
  --border:#2a3045; --text:#e8e6f0; --muted:#6b7394;
  --accent:#7C3AED; --accent2:#FF6B35; --gold:#F59E0B;
  --green:#059669; --blue:#0EA5E9; --pink:#EC4899;
}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh}

/* ── SIDEBAR ── */
#sidebar{
  width:250px;min-height:100vh;background:var(--surface);
  border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;
  display:flex;flex-direction:column;overflow-y:auto;z-index:100;
  transition:transform .3s;
}
#sidebar .brand h5{font-family:'Crimson Pro',serif;font-size:1.35rem;color:#fff;font-weight:700;margin:0}
#sidebar .brand small{color:var(--muted);font-size:.72rem}
.nav-section{font-size:.68rem;font-weight:800;color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;padding:14px 16px 4px}
.nav-lnk{
  display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;
  cursor:pointer;color:var(--muted);font-weight:600;font-size:.88rem;
  transition:all .18s;border:1px solid transparent;text-decoration:none;
}
.nav-lnk:hover{background:var(--surface2);color:var(--text)}
.nav-lnk.active{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.4);color:#c4b5fd}
.sidebar-bottom{margin-top:auto;border-top:1px solid var(--border);padding:14px}
.user-chip{display:flex;align-items:center;gap:10px;background:var(--surface2);
  border-radius:10px;padding:10px 12px}

/* ── MAIN ── */
#main-content{margin-left:250px;padding:28px 32px;min-height:100vh}

/* ── CARDS ── */
.lm-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.lm-card-hover{transition:all .2s;cursor:pointer}
.lm-card-hover:hover{border-color:var(--accent);transform:translateY(-2px);
  box-shadow:0 10px 32px rgba(0,0,0,.4)}
.stat-val{font-family:'Crimson Pro',serif;font-size:2.2rem;font-weight:700;color:#fff}
.stat-lbl{font-size:.75rem;color:var(--muted);font-weight:600;margin-top:2px}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:20px;font-size:.72rem;font-weight:700}
.bdg-admin{background:rgba(245,158,11,.2);color:#fbbf24}
.bdg-teacher{background:rgba(14,165,233,.2);color:#38bdf8}
.bdg-student{background:rgba(5,150,105,.2);color:#34d399}
.bdg-basic{background:rgba(5,150,105,.15);color:#6ee7b7}
.bdg-inter{background:rgba(245,158,11,.15);color:#fcd34d}
.bdg-adv{background:rgba(239,68,68,.15);color:#fca5a5}

/* ── CATEGORY CARD ── */
.cat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:20px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;
}
.cat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ccolor,var(--accent))}
.cat-card:hover{border-color:var(--ccolor,var(--accent));transform:translateY(-2px);
  box-shadow:0 12px 36px rgba(0,0,0,.4)}
.cat-tag{padding:2px 8px;border-radius:8px;font-size:.68rem;font-weight:600;
  background:var(--surface2);color:var(--muted);border:1px solid var(--border);
  display:inline-block;margin:2px}

/* ── THEORY ── */
.theory-box{background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;padding:20px;line-height:1.8;font-size:.91rem}
.theory-box b{color:var(--accent2)}

/* ── EXAMPLES ── */
.ex-es{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.3);
  border-radius:12px;padding:14px 16px}
.ex-en{background:rgba(14,165,233,.1);border:1px solid rgba(14,165,233,.25);
  border-radius:12px;padding:14px 16px}
.ex-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:5px}
.ex-text{font-style:italic;color:#fff;font-size:.9rem}

/* ── QUIZ ── */
.quiz-opt{
  width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;
  background:var(--surface2);color:var(--text);font-family:'Nunito',sans-serif;
  font-size:.9rem;font-weight:600;text-align:left;cursor:pointer;transition:all .18s;
}
.quiz-opt:hover:not(:disabled){border-color:var(--accent);color:#c4b5fd}
.quiz-opt.correct{border-color:var(--green)!important;background:rgba(5,150,105,.15)!important;color:#6ee7b7!important}
.quiz-opt.wrong{border-color:#ef4444!important;background:rgba(239,68,68,.12)!important;color:#fca5a5!important}
.quiz-dot{height:6px;border-radius:3px;background:var(--surface2);flex:1;transition:background .3s}
.quiz-dot.done-ok{background:var(--green)}
.quiz-dot.done-ko{background:#ef4444}
.quiz-dot.cur{background:var(--accent)}

/* ── TABLES ── */
.lm-table{width:100%;border-collapse:collapse;font-size:.82rem}
.lm-table th{padding:10px 12px;text-align:left;font-size:.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
  border-bottom:1px solid var(--border)}
.lm-table td{padding:10px 12px;border-bottom:1px solid rgba(42,48,69,.5)}
.lm-table tr:hover td{background:var(--surface2)}
.mono{font-family:'JetBrains Mono',monospace}

/* ── PROGRESS ── */
.lm-prog{height:7px;border-radius:4px;background:var(--surface2);overflow:hidden}
.lm-prog-fill{height:100%;border-radius:4px;transition:width .5s}

/* ── FORMS ── */
.lm-inp,.lm-ta,.lm-sel{
  width:100%;padding:11px 15px;background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;color:var(--text);
  font-family:'Nunito',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s;
}
.lm-ta{min-height:80px;resize:vertical}
.lm-inp:focus,.lm-ta:focus,.lm-sel:focus{border-color:var(--accent)}
.lm-sel option{background:#1e2330}
.lm-label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}

/* ── BUTTONS ── */
.btn-lm{padding:9px 18px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:700;font-size:.83rem;transition:all .18s}
.btn-lm-accent{background:var(--accent);color:#fff}
.btn-lm-accent:hover{background:#6d28d9;box-shadow:0 6px 20px rgba(124,58,237,.4)}
.btn-lm-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.btn-lm-ghost:hover{border-color:var(--accent);color:var(--text)}
.btn-lm-danger{background:rgba(239,68,68,.18);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.btn-lm-primary{width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;
  color:#fff;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;
  transition:all .2s}
.btn-lm-primary:hover{background:#6d28d9;transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(124,58,237,.4)}
.back-btn{display:inline-flex;align-items:center;gap:7px;color:var(--muted);cursor:pointer;
  font-size:.83rem;font-weight:600;margin-bottom:18px;transition:color .2s;background:none;border:none}
.back-btn:hover{color:var(--text)}
.success-box{background:rgba(5,150,105,.15);border:1px solid rgba(5,150,105,.3);
  border-radius:14px;padding:28px;text-align:center;margin-top:18px}

/* ── LOGIN ── */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 20% 50%,#1a0a2e 0%,#0d0f14 60%),
              radial-gradient(ellipse at 80% 20%,#0a1a2e 0%,transparent 50%);
  padding:20px;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;
  padding:44px 38px;width:100%;max-width:430px;
  box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 80px rgba(124,58,237,.08);
}
.quick-role{
  padding:10px 8px;border:1px solid var(--border);background:var(--surface2);
  border-radius:12px;cursor:pointer;text-align:center;transition:all .2s;
  color:var(--text);font-family:'Nunito',sans-serif;font-size:.78rem;font-weight:600;
  width:100%;
}
.quick-role:hover{border-color:var(--accent);background:rgba(124,58,237,.15)}

/* ── PAGE TITLE ── */
.page-title{font-family:'Crimson Pro',serif;font-size:1.95rem;font-weight:700;color:#fff;margin-bottom:2px}
.page-sub{color:var(--muted);font-size:.87rem;margin-bottom:24px}

/* ── LESSON ROW ── */
.lesson-row{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;
}
.lesson-row:hover{border-color:var(--accent);background:rgba(124,58,237,.05)}
.lesson-num{width:38px;height:38px;border-radius:10px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--muted);
  font-size:.82rem;flex-shrink:0}
.lesson-num.done{background:rgba(5,150,105,.2);color:#34d399}

/* ── COURSE CARD ── */
.course-card{background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px 20px;margin-bottom:12px}

/* ── MOBILE ── */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main-content{margin-left:0;padding:20px 14px}
  .hamburger{display:flex!important}
  .hide-mobile{display:none!important}
}
.hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:8px 10px;cursor:pointer;font-size:1.1rem}

/* ── OFFCANVAS OVERLAY ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#overlay.show{display:block}
</style>
</head>
<body>

<!-- ========== LOGIN SCREEN ========== -->
<div id="screen-login" class="login-wrap">
  <div class="login-card">
    <div class="text-center mb-4">
      <div style="font-size:2.6rem">📖</div>
      <h1 style="font-family:'Crimson Pro',serif;font-size:2rem;font-weight:700;color:#fff;letter-spacing:-1px;margin:4px 0">LinguaMaestra</h1>
      <small style="color:var(--muted)">Plataforma de Gramática Española &amp; Comparativa</small>
    </div>

    <p class="text-center" style="font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Acceso Rápido</p>
    <div class="row g-2 mb-4">
      <div class="col-4"><button class="quick-role" onclick="quickLogin('admin')"><div style="font-size:1.4rem">👑</div>Admin</button></div>
      <div class="col-4"><button class="quick-role" onclick="quickLogin('teacher')"><div style="font-size:1.4rem">👨‍🏫</div>Profesor</button></div>
      <div class="col-4"><button class="quick-role" onclick="quickLogin('student')"><div style="font-size:1.4rem">🎓</div>Estudiante</button></div>

    <hr style="border-color:var(--border);margin-bottom:20px"/>
    <div class="mb-3">
      <label class="lm-label">Email</label>
      <input id="inp-email" class="lm-inp" type="email" placeholder="usuario@lingua.edu" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="mb-4">
      <label class="lm-label">Contraseña</label>
      <input id="inp-pass" class="lm-inp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-lm-primary" onclick="doLogin()">Iniciar Sesión</button>
    <div id="login-err" class="text-center mt-2" style="color:#f87171;font-size:.84rem;display:none"></div>
    <p class="text-center mt-3" style="color:var(--muted);font-size:.72rem">
      Demo: admin@lingua.edu / admin123 &nbsp;·&nbsp; garcia@lingua.edu / prof123 &nbsp;·&nbsp; ana@lingua.edu / est123
    </p>
  </div>
</div>

<!-- ========== APP SHELL ========== -->
<div id="screen-app" style="display:none">

  <!-- Hamburger -->
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="brand p-3 pb-2">
      <h5>📖 LinguaMaestra</h5>
      <small>Plataforma Gramatical</small>
    </div>
    <div class="nav-section">Navegación</div>
    <div id="sidebar-nav" class="px-2"></div>
    <div id="sidebar-cats" class="px-2"></div>
    <div class="sidebar-bottom">
      <div class="user-chip">
        <span id="sb-avatar" style="font-size:1.3rem"></span>
        <div style="flex:1">
          <div id="sb-name" style="font-weight:700;font-size:.88rem"></div>
          <div id="sb-role" style="font-size:.72rem;color:var(--muted)"></div>
        </div>
        <button class="btn-lm btn-lm-ghost" style="padding:6px 10px;font-size:.8rem" onclick="logout()">↩</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-content">
    <div id="page-root"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ============================================================
// DATA
// ============================================================
const CATEGORIES = [
  { id:"coordinacion",   name:"Coordinación",              icon:"⚡",  color:"#FF6B35",
    subcats:["Copulativas","Disyuntivas","Adversativas","Explicativas","Distributivas","Causales coord.","Ilativas"],
    desc:"Proposiciones con igual jerarquía sintáctica unidas por conjunciones coordinantes." },
  { id:"sustantivas",    name:"Subordinadas Sustantivas",   icon:"📚", color:"#7C3AED",
    subcats:["Sujeto","Objeto Directo","Obj. Indirecto","Atributo","Compl. Preposicional","Infinitivo","Gerundio","Exclamativa indirecta"],
    desc:"Desempeñan la función de un sustantivo dentro de la oración principal." },
  { id:"adjetivas",      name:"Subordinadas Adjetivas",     icon:"🔗", color:"#059669",
    subcats:["Especificativa","Explicativa","Relativo 'quien'","Relativo 'cuyo'","Relativo 'donde'","Relativo 'cuando'","Contacto (sin nexo)","Participio"],
    desc:"Funcionan como adjetivos, modificando a un sustantivo antecedente." },
  { id:"adverbiales",    name:"Subordinadas Adverbiales",   icon:"🕐", color:"#0EA5E9",
    subcats:["Temporales","Causales","Condicionales","Concesivas","Finales","Consecutivas","Comparativas","Modales"],
    desc:"Funcionan como adverbios; expresan tiempo, causa, condición, concesión, etc." },
  { id:"yuxtaposicion",  name:"Yuxtaposición",              icon:"✂️", color:"#F59E0B",
    subcats:["Enumerativa","Explicativa asindética","Adversativa asindética","Causal asindética"],
    desc:"Proposiciones unidas sin nexo, solo por signos de puntuación." },
  { id:"estilisticas",   name:"Técnicas Estilísticas",      icon:"✨", color:"#EC4899",
    subcats:["Hipotaxis inversa","Oraciones escindidas","Polisíndeton","Asíndeton","Zeugma","Período retórico","Discurso indirecto libre","Nominalización"],
    desc:"Recursos avanzados para enriquecer la expresión escrita y oral." },
  { id:"comparativa",    name:"Comparativa Multilingüe",    icon:"🌍", color:"#6366F1",
    subcats:["Chino","Hindi","Coreano","Japonés","Árabe","Ruso","Francés","Alemán","Portugués"],
    desc:"Análisis comparativo de oraciones compuestas en diferentes sistemas lingüísticos." }
];

const LESSONS = {
  coordinacion:[
    { id:"c1", title:"Conjunciones Copulativas", level:"Básico",
      theory:`Las oraciones copulativas unen ideas sumando o acumulando. Los nexos principales son: <b>y, e, ni, que</b>.<br><br>
<b>y / e</b>: suma ideas positivas → <i>Estudio y trabajo.</i><br>
<b>ni</b>: suma ideas negativas → <i>Ni come ni duerme.</i><br>
<b>que</b>: equivale a 'y' en contextos literarios → <i>Dale que dale.</i>`,
      examples:[
        { es:"María estudia y Pedro trabaja.", en:"María studies and Pedro works.", type:"Copulativa con 'y'" },
        { es:"No come ni duerme bien.", en:"He neither eats nor sleeps well.", type:"Copulativa con 'ni'" },
        { es:"Llegó e inmediatamente comenzó.", en:"He arrived and immediately began.", type:"Copulativa con 'e'" }
      ],
      exercises:[
        { q:"¿Qué nexo une: 'Estudia ___ trabaja todo el día'?", opts:["y","pero","porque","si"], ans:0 },
        { q:"Identifica el tipo: 'No ríe ni llora'", opts:["Copulativa negativa","Adversativa","Disyuntiva","Causal"], ans:0 },
        { q:"¿Cuál es la forma correcta ante vocal inicial?", opts:["e (no y)","y siempre","ni siempre","o siempre"], ans:0 }
      ]
    },
    { id:"c2", title:"Conjunciones Adversativas", level:"Intermedio",
      theory:`Las adversativas oponen o contrastan dos proposiciones:<br><br>
<b>pero</b>: oposición parcial → <i>Quiero ir, pero estoy cansado.</i><br>
<b>sino (que)</b>: oposición total → <i>No es tonto, sino listo.</i><br>
<b>sin embargo / no obstante</b>: adversativas del discurso → <i>Llovía; sin embargo, salí.</i>`,
      examples:[
        { es:"Es inteligente pero perezoso.", en:"He is intelligent but lazy.", type:"Adversativa restrictiva" },
        { es:"No llegó tarde, sino muy tarde.", en:"He didn't arrive late, but very late.", type:"Adversativa exclusiva" },
        { es:"Estudió mucho; no obstante, suspendió.", en:"He studied a lot; however, he failed.", type:"Adversativa discursiva" }
      ],
      exercises:[
        { q:"Elige el nexo: 'No es médico ___ enfermero'", opts:["sino","pero","aunque","sin embargo"], ans:0 },
        { q:"¿Qué adversativa expresa oposición parcial?", opts:["pero","sino","sin embargo","aunque"], ans:0 },
        { q:"'Trabajó duro; ___, no recibió aumento.'", opts:["sin embargo","sino","pero","o"], ans:0 }
      ]
    }
  ],
  adverbiales:[
    { id:"a1", title:"Subordinadas Temporales", level:"Básico",
      theory:`Expresan el tiempo en que ocurre la acción. Nexos:<br><br>
<b>cuando</b>: simultaneidad → <i>Cuando llegué, él dormía.</i><br>
<b>mientras</b>: duración simultánea → <i>Mientras cocina, escucha música.</i><br>
<b>antes de que</b>: anterioridad → <i>Antes de que llegues, prepararé todo.</i><br>
<b>después de que</b>: posterioridad → <i>Después de que comió, descansó.</i><br>
<b>en cuanto</b>: inmediatez → <i>En cuanto salga, te llamo.</i><br>
<b>desde que</b>: punto de inicio → <i>Desde que llegaste, todo cambió.</i>`,
      examples:[
        { es:"Cuando llegué, él ya se había ido.", en:"When I arrived, he had already left.", type:"Temporal con 'cuando'" },
        { es:"Mientras dormía, soñé con el mar.", en:"While I slept, I dreamed of the sea.", type:"Temporal con 'mientras'" },
        { es:"En cuanto termine, te aviso.", en:"As soon as I finish, I'll let you know.", type:"Temporal de inmediatez" }
      ],
      exercises:[
        { q:"¿Qué nexo indica inmediatez temporal?", opts:["en cuanto","cuando","mientras","desde que"], ans:0 },
        { q:"'___ llegues, llámame.' ¿Nexo de anterioridad?", opts:["Antes de que","Cuando","Mientras","Desde que"], ans:0 },
        { q:"Identifica la sub. temporal: 'Desde que te fuiste, todo cambió.'", opts:["Desde que te fuiste","todo cambió","te fuiste","todo"], ans:0 }
      ]
    },
    { id:"a2", title:"Subordinadas Condicionales", level:"Intermedio",
      theory:`Expresan la condición necesaria para que se cumpla la acción:<br><br>
<b>si</b> + indicativo → condición real → <i>Si estudias, aprobarás.</i><br>
<b>si</b> + imperf. subj. → irreal presente → <i>Si estudiaras, aprobarías.</i><br>
<b>si</b> + pluscuamp. subj. → irreal pasado → <i>Si hubieras estudiado, habrías aprobado.</i><br>
<b>a menos que</b>: condición negativa → <i>A menos que llueva, saldremos.</i><br>
<b>con tal de que</b>: permisiva → <i>Con tal de que vengas, acepto.</i>`,
      examples:[
        { es:"Si estudias, aprobarás el examen.", en:"If you study, you will pass.", type:"Condicional real" },
        { es:"Si tuvieras dinero, viajarías.", en:"If you had money, you would travel.", type:"Condicional irreal presente" },
        { es:"A menos que llueva, saldremos.", en:"Unless it rains, we will go out.", type:"Condicional negativa" }
      ],
      exercises:[
        { q:"'Si ___ tiempo, te ayudaré.' ¿Verbo correcto?", opts:["tengo","tenga","tuviera","tendría"], ans:0 },
        { q:"'Si hubiera estudiado, ___.' ¿Modo?", opts:["habría aprobado","aprobaré","apruebo","aprobaba"], ans:0 },
        { q:"¿Qué nexo equivale a 'if not' en español?", opts:["a menos que","con tal de que","siempre que","aunque"], ans:0 }
      ]
    },

function doLogin(){
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  const u = DB.users.find(x => x.email===email && x.pass===pass);
  if(u){ loginAs(u); }
  else { showErr('Email o contraseña incorrectos'); }
}
function quickLogin(role){ const u=DB.users.find(x=>x.role===role); if(u) loginAs(u); }
function loginAs(u){
  currentUser=u;
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-app').style.display='block';

  navigate('dashboard');

function updateSidebarActive(){
  document.querySelectorAll('.nav-lnk').forEach(el=>el.classList.remove('active'));
  const target = currentPage==='category' ? `nav-cat-${currentParam}` : `nav-${currentPage}`;
  const el = document.getElementById(target);
  if(el) el.classList.add('active');
}

// ============================================================
// ROUTER
// ============================================================
function navigate(page, param=null){
  currentPage=page; currentParam=param;
  updateSidebarActive();
  const root=document.getElementById('page-root');
  root.innerHTML='';
  closeSidebar();
  if(page==='dashboard'){
    if(currentUser.role==='admin') root.innerHTML=renderAdminDash();
    else if(currentUser.role==='teacher') root.innerHTML=renderTeacherDash();
    else root.innerHTML=renderStudentDash();
    attachDashEvents();
  } else if(page==='categories') root.innerHTML=renderAllCategories();
  else if(page==='category')     root.innerHTML=renderCategoryPage(param);
  else if(page==='lesson')       root.innerHTML=renderLessonPage(param);
  else if(page==='create-course'){ root.innerHTML=renderCreateCourse(); attachCourseEvents(); }
  else if(page==='comparative')  root.innerHTML=renderComparativePage();
  else if(page==='users')        root.innerHTML=renderUsersAdmin();
  window.scrollTo(0,0);
}

function pct(done, total){ return total ? Math.round(done/total*100) : 0; }

function statCard(icon,num,lbl){
  return `<div class="col-6 col-md-3">
    <div class="lm-card text-center p-3">
      <div style="font-size:1.5rem;margin-bottom:6px">${icon}</div>
      <div class="stat-val">${num}</div>
      <div class="stat-lbl">${lbl}</div>

}
function catTagsHtml(subcats, max=4){
  let html = subcats.slice(0,max).map(s=>`<span class="cat-tag">${s}</span>`).join('');
  if(subcats.length>max) html+=`<span class="cat-tag">+${subcats.length-max}</span>`;
  return html;
}
function progBar(val, color='var(--accent)'){
  return `<div class="lm-prog"><div class="lm-prog-fill" style="width:${val}%;background:${color}"></div></div>`;
}

function saveExercise(){
  const q=document.getElementById('eq-q').value.trim();
  const opts=[0,1,2,3].map(i=>document.getElementById(`eq-opt${i}`).value.trim());
  if(!q||opts.some(o=>!o)){ alert('Completa todos los campos'); return; }
  const btn=document.getElementById('save-eq-btn');
  btn.textContent='✅ Guardado'; btn.disabled=true;
  setTimeout(()=>{btn.textContent='💾 Guardar ejercicio';btn.disabled=false;
    document.getElementById('eq-q').value='';
    [0,1,2,3].forEach(i=>document.getElementById(`eq-opt${i}`).value='');
  },2000);
}

// LESSON PAGE
// ============================================================
let quizState = { qi:0, answers:[], chosen:null, done:false };

function renderLessonPage(lessonId){
  const lesson = allLessons().find(l=>l.id===lessonId);
  if(!lesson) return '<p class="text-danger">Lección no encontrada</p>';
  quizState = { qi:0, answers:[], chosen:null, done:false };

  const catId = Object.keys(LESSONS).find(k=>LESSONS[k].some(l=>l.id===lessonId));

  return `
  <button class="back-btn" onclick="navigate('category','${catId}')">← Volver a categoría</button>
  <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
    <div>
      <p class="page-title mb-1">${lesson.title}</p>
      <div class="d-flex align-items-center gap-2">
        ${getLevelBadge(lesson.level)}
        <small style="color:var(--muted)">${lesson.exercises.length} ejercicios</small>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <ul class="nav mb-4" style="gap:8px">
    <li><button class="btn-lm btn-lm-accent" id="tab-theory-btn" onclick="switchTab('theory','${lessonId}')">📖 Teoría</button></li>
    <li><button class="btn-lm btn-lm-ghost" id="tab-examples-btn" onclick="switchTab('examples','${lessonId}')">💡 Ejemplos</button></li>
    <li><button class="btn-lm btn-lm-ghost" id="tab-practice-btn" onclick="switchTab('practice','${lessonId}')">✏️ Práctica</button></li>
  </ul>

  <div id="tab-content">
    ${renderTheoryTab(lesson)}
  </div>`;
}

function switchTab(tab, lessonId){
  const lesson = allLessons().find(l=>l.id===lessonId);
  ['theory','examples','practice'].forEach(t=>{
    const btn=document.getElementById(`tab-${t}-btn`);
    if(btn){ btn.className = t===tab ? 'btn-lm btn-lm-accent' : 'btn-lm btn-lm-ghost'; }
  });
  const content=document.getElementById('tab-content');
  if(tab==='theory') content.innerHTML=renderTheoryTab(lesson);
  else if(tab==='examples') content.innerHTML=renderExamplesTab(lesson);
  else content.innerHTML=renderPracticeTab(lesson);
}

function renderTheoryTab(lesson){
  return `<div class="theory-box">${lesson.theory}</div>`;
}

function renderExamplesTab(lesson){
  return lesson.examples.map((ex,i)=>`
    <div class="mb-3">
      <div class="mb-2" style="font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px">${ex.type}</div>
      <div class="row g-2">
        <div class="col-12 col-md-6"><div class="ex-es"><div class="ex-label">🇪🇸 Español</div><div class="ex-text">${ex.es}</div></div></div>
        <div class="col-12 col-md-6"><div class="ex-en"><div class="ex-label">🇬🇧 English</div><div class="ex-text">${ex.en}</div></div></div>
      </div>
    </div>`).join('');
}

function renderPracticeTab(lesson){
  if(quizState.done) return renderQuizResult(lesson);
  return renderQuizQuestion(lesson);
}

function renderQuizProgress(lesson){
  return `<div class="d-flex gap-1 mb-3">
    ${lesson.exercises.map((_,i)=>`
      <div class="quiz-dot ${i<quizState.qi?(quizState.answers[i]?'done-ok':'done-ko'):i===quizState.qi?'cur':''}"></div>`).join('')}
  </div>`;
}

function renderQuizQuestion(lesson){
  const q = lesson.exercises[quizState.qi];
  return `
  ${renderQuizProgress(lesson)}
  <p style="font-size:.75rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px">
    Pregunta ${quizState.qi+1} de ${lesson.exercises.length}
  </p>
  <div class="fw-bold text-white mb-3" style="font-size:1.02rem;line-height:1.5">${q.q}</div>
  <div class="d-flex flex-column gap-2 mb-3">
    ${q.opts.map((opt,i)=>`
      <button class="quiz-opt" id="qopt-${i}" onclick="chooseAnswer(${i},'${lesson.id}')">
        <span class="mono me-2" style="color:var(--muted)">${String.fromCharCode(65+i)}.</span>${opt}
      </button>`).join('')}
  </div>`;
}

function renderQuizResult(lesson){
  const score = quizState.answers.filter(Boolean).length;
  const total = lesson.exercises.length;
  const p = Math.round(score/total*100);
  return `
  <div class="success-box">
    <div style="font-size:2.5rem;margin-bottom:8px">${p>=66?'🎉':'📖'}</div>
    <h5 style="color:#6ee7b7;font-weight:800">${p>=66?'¡Excelente trabajo!':'Sigue practicando'}</h5>
    <p style="color:#a7f3d0;margin-top:8px">Respuestas correctas: ${score} / ${total} — ${p}%</p>
    <button class="btn-lm btn-lm-accent mt-3" onclick="retryQuiz('${lesson.id}')">🔄 Intentar de nuevo</button>
  </div>`;
}

function chooseAnswer(idx, lessonId){
  if(quizState.chosen!==null) return;
  const lesson = allLessons().find(l=>l.id===lessonId);
  const q = lesson.exercises[quizState.qi];
  quizState.chosen = idx;
  const ok = idx===q.ans;

  // Style buttons
  q.opts.forEach((_,i)=>{
    const btn=document.getElementById(`qopt-${i}`);
    if(!btn) return;
    btn.disabled=true;
    if(i===q.ans) btn.classList.add('correct');
    else if(i===idx) btn.classList.add('wrong');
  });

  setTimeout(()=>{
    quizState.answers.push(ok);
    if(quizState.qi+1 < lesson.exercises.length){
      quizState.qi++;
      quizState.chosen=null;
      document.getElementById('tab-content').innerHTML=renderPracticeTab(lesson);
    } else {
      quizState.done=true;
      const score=quizState.answers.filter(Boolean).length;
      completeLesson(lessonId, score, lesson.exercises.length);
      document.getElementById('tab-content').innerHTML=renderPracticeTab(lesson);
    }
  }, 900);
}

function retryQuiz(lessonId){
  quizState = { qi:0, answers:[], chosen:null, done:false };
  const lesson = allLessons().find(l=>l.id===lessonId);
  document.getElementById('tab-content').innerHTML=renderPracticeTab(lesson);
}

function completeLesson(lessonId, score, total){
  if(currentUser.role!=='student') return;
  const uid=currentUser.id;
  if(!DB.progress[uid]) DB.progress[uid]={};
  DB.progress[uid][lessonId]={done:true,score};
  const pts = score*10;
  const u = DB.users.find(x=>x.id===uid);
  if(u) u.score=(u.score||0)+pts;
  currentUser.score=(currentUser.score||0)+pts;
  document.getElementById('sb-name').textContent=currentUser.name.split(' ')[0];
}

let selectedCats = [];

function toggleCatSel(id, color){
  const el=document.getElementById(`catsel-${id}`);
  const check=document.getElementById(`catsel-check-${id}`);
  if(selectedCats.includes(id)){
    selectedCats=selectedCats.filter(c=>c!==id);
    el.style.border='1px solid var(--border)';
    el.style.background='var(--surface)';
    check.style.display='none';
  } else {
    selectedCats.push(id);
    el.style.border=`2px solid ${color}`;
    el.style.background=`${color}18`;
    check.style.display='inline';
  }
}

function saveCourse(){
  const title=document.getElementById('cc-title').value.trim();
  if(!title||selectedCats.length===0){
    document.getElementById('cc-err').style.color='#f87171';
    return;
  }
  DB.courses.push({ id:Date.now(), title, teacherId:currentUser.id, students:[], published:false, cats:selectedCats });
  selectedCats=[];
  const btn=document.getElementById('save-course-btn');
  btn.textContent='✅ ¡Curso creado!'; btn.disabled=true;
  setTimeout(()=>navigate('dashboard'),1500);
}
