<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lección: Oraciones Compuestas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/custom.css">
</head>
<body>
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center">
      <h2>Las oraciones compuestas</h2>
      <div>
        <button id="speakBtn" class="btn btn-outline-primary btn-sm" aria-label="Escuchar">🔊 Escuchar</button>
        <button id="recordBtn" class="btn btn-outline-success btn-sm" aria-label="Grabar">🎙 Grabar</button>
      </div>
    </div>

    <article class="mt-3">
      <h4>Definición</h4>
      <p id="lessonText">Una oración compuesta es una oración que contiene dos o más proposiciones unidas por conjunciones o nexos. Ejemplo: "Juan come y María lee".</p>
    </article>

    <section class="mt-4">
      <h5>Ejercicio: Identifica la conjunción</h5>
      <div class="list-group">
        <button class="list-group-item list-group-item-action" data-correct="false">pero</button>
        <button class="list-group-item list-group-item-action" data-correct="true">y</button>
        <button class="list-group-item list-group-item-action" data-correct="false">sin</button>
      </div>
      <div id="feedback" class="mt-3" aria-live="polite"></div>
    </section>
  </div>

<script src="../assets/js/tts.js"></script>
<script src="../assets/js/recorder.js"></script>
<script>
  document.querySelectorAll('.list-group-item').forEach(btn=>{
    btn.addEventListener('click', ()=> {
      const ok = btn.dataset.correct === 'true';
      const feedback = document.getElementById('feedback');
      if(ok){
        feedback.innerHTML = '<div class="alert alert-success">Correcto ✅ +10 pts</div>';
        let pts = Number(localStorage.getItem('points')||0) + 10;
        localStorage.setItem('points', pts);
        document.getElementById('userPoints')?.textContent = pts;
      } else {
        feedback.innerHTML = '<div class="alert alert-danger">No es correcto ❌ Intenta de nuevo</div>';
      }
    });
  });

  document.getElementById('speakBtn').addEventListener('click', ()=> {
    const text = document.getElementById('lessonText').textContent;
    speak(text);
  });

  document.getElementById('recordBtn').addEventListener('click', ()=> {
    toggleRecording();
  });

  document.addEventListener('DOMContentLoaded', ()=>{
    const pts = Number(localStorage.getItem('points')||0);
    const el = document.getElementById('userPoints');
    if(el) el.textContent = pts;
  });
</script>
</body>
</html>
