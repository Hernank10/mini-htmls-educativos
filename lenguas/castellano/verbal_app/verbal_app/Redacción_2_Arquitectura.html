<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Arquitectura Verbal · 100 técnicas de redacción</title>
  <style>
    /* ----- VARIABLES CSS (paleta cálida, fatiga visual reducida) ----- */
    :root {
      --fondo-piel: #fef7e6;         /* pergamino claro */
      --texto-principal: #3b2a1f;    /* marrón oscuro suave */
      --arena: #e9dbc3;
      --ámbar: #c28135;
      --ámbar-claro: #e0a46b;
      --sombra-calida: rgba(100, 60, 20, 0.08);
      --borde-suave: #d9c8ae;
      --acierto: #2c6e2c;
      --fallo: #b1624b;
      --card-bg: #fffbf0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--fondo-piel);
      color: var(--texto-principal);
      font-family: 'Segoe UI', 'Roboto', 'Georgia', serif;
      line-height: 1.5;
      padding: 1rem;
      min-height: 100vh;
    }

    /* contenedor principal */
    .app-container {
      max-width: 1300px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 2rem;
      box-shadow: 0 12px 30px var(--sombra-calida);
      overflow: hidden;
      backdrop-filter: blur(0px);
      border: 1px solid var(--borde-suave);
    }

    /* cabecera */
    header {
      background: #fff3e0;
      padding: 1.2rem 2rem;
      border-bottom: 3px solid var(--ámbar);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
    }
    h1 {
      font-size: 1.7rem;
      font-weight: 500;
      letter-spacing: -0.3px;
      color: #5a3a22;
    }
    h1 small {
      font-size: 0.8rem;
      font-weight: normal;
      color: #7a5a3a;
      margin-left: 0.5rem;
    }

    /* navegación */
    nav {
      display: flex;
      gap: 0.5rem;
      background: #f5ebda;
      padding: 0.6rem 2rem;
      border-bottom: 1px solid var(--borde-suave);
    }
    .nav-btn {
      background: transparent;
      border: none;
      font-size: 1.05rem;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      color: #634e2e;
      transition: all 0.2s;
    }
    .nav-btn.active {
      background-color: var(--ámbar);
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .nav-btn:hover:not(.active) {
      background-color: var(--arena);
    }

    /* vistas */
    .view {
      display: none;
      padding: 2rem;
      animation: fade 0.2s ease;
    }
    .view.active-view {
      display: block;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(6px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* tarjetas genéricas */
    .card {
      background: white;
      border-radius: 1.8rem;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 4px 12px var(--sombra-calida);
      border: 1px solid var(--borde-suave);
      margin-bottom: 1.5rem;
    }

    /* dashboard: estadísticas */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--fondo-piel);
      border-radius: 1.5rem;
      padding: 1rem;
      text-align: center;
      border-left: 8px solid var(--ámbar);
    }
    .stat-number {
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--ámbar);
    }
    .progress-bar-bg {
      background: #e2d5c0;
      border-radius: 40px;
      height: 12px;
      overflow: hidden;
      margin: 0.8rem 0;
    }
    .progress-fill {
      background: var(--ámbar);
      width: 0%;
      height: 100%;
      border-radius: 40px;
      transition: width 0.2s;
    }

    /* listado */
    .tecnicas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.2rem;
      max-height: 65vh;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    .tecnica-item {
      background: white;
      border-radius: 1.2rem;
      padding: 0.8rem 1rem;
      border-left: 5px solid var(--ámbar-claro);
      transition: 0.1s;
    }
    .tecnica-titulo {
      font-weight: 700;
      font-size: 0.95rem;
      color: #5c3b1a;
    }
    .tecnica-ejemplo {
      font-size: 0.85rem;
      color: #6f5a42;
      margin-top: 6px;
      border-top: 1px dashed #ecdca8;
      padding-top: 6px;
    }
    .badge-progreso {
      font-size: 0.7rem;
      background: #e9dbc3;
      border-radius: 20px;
      padding: 2px 8px;
      display: inline-block;
      margin-top: 6px;
    }

    /* práctica */
    .flashcard {
      background: #fff7ed;
      border-radius: 2rem;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 15px 30px rgba(0,0,0,0.05);
      border: 1px solid var(--borde-suave);
      max-width: 750px;
      margin: 0 auto;
    }
    .pregunta {
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 2rem;
      background: #fdf3e2;
      padding: 1.2rem;
      border-radius: 1.5rem;
    }
    .respuesta-oculta {
      background: #efe2cf;
      border-radius: 1.2rem;
      padding: 1rem;
      margin: 1rem 0;
      color: #2f241b;
      display: none;
    }
    .btn {
      background: var(--arena);
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 3rem;
      font-weight: 600;
      margin: 0.3rem;
      cursor: pointer;
      transition: 0.1s;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--ámbar);
      color: white;
    }
    .btn-acierto {
      background: var(--acierto);
      color: white;
    }
    .btn-fallo {
      background: var(--fallo);
      color: white;
    }
    .modo-selector {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      border-top: 1px solid var(--borde-suave);
      background: #faf1e2;
    }
    @media (max-width: 680px) {
      .view { padding: 1rem; }
      .pregunta { font-size: 1.1rem; }
      .tecnicas-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <header>
    <h1>📐 Arquitectura Verbal <small>100 técnicas de redacción</small></h1>
    <div style="font-size:0.85rem;">✍️ para estudiantes de arquitectura</div>
  </header>
  <nav>
    <button class="nav-btn active" data-view="dashboard">📊 Panel</button>
    <button class="nav-btn" data-view="listado">📜 Listado técnico</button>
    <button class="nav-btn" data-view="practica">🃏 Práctica</button>
  </nav>

  <!-- VISTA DASHBOARD -->
  <section id="dashboard" class="view active-view">
    <div class="stats-grid" id="statsContainer"></div>
    <div class="card">
      <h3>📈 Progreso general</h3>
      <div class="progress-bar-bg"><div class="progress-fill" id="globalProgressFill"></div></div>
      <p id="globalProgressText"></p>
      <p style="margin-top:1rem; font-size:0.85rem;">✅ Aciertos registrados en modo práctica. Cada técnica puede practicarse múltiples veces.</p>
      <button id="resetProgresoBtn" class="btn" style="background:#d9b48b;">🔄 Reiniciar progreso</button>
    </div>
  </section>

  <!-- VISTA LISTADO DE TÉCNICAS -->
  <section id="listado" class="view">
    <input type="text" id="filtroListado" placeholder="🔍 Filtrar por técnica o ejemplo..." style="width:100%; padding:10px; margin-bottom:15px; border-radius:40px; border:1px solid var(--borde-suave);">
    <div id="tecnicasListadoContainer" class="tecnicas-grid"></div>
  </section>

  <!-- VISTA PRÁCTICA (flashcards) -->
  <section id="practica" class="view">
    <div class="modo-selector">
      <button id="modoTecnicaEjemplo" class="btn btn-primary">📖 Técnica → Ejemplo</button>
      <button id="modoEjemploTecnica" class="btn">🔄 Ejemplo → Técnica</button>
    </div>
    <div class="flashcard">
      <div id="cardPregunta" class="pregunta"></div>
      <button id="mostrarRespuestaBtn" class="btn">📖 Mostrar respuesta</button>
      <div id="respuestaDiv" class="respuesta-oculta"></div>
      <div style="margin-top: 1.5rem;" id="botonesAccion">
        <button id="aciertoBtn" class="btn btn-acierto" disabled>✅ Acierto</button>
        <button id="falloBtn" class="btn btn-fallo" disabled>❌ Fallo</button>
      </div>
      <button id="siguienteCardBtn" class="btn" style="margin-top:1rem;">⏩ Siguiente técnica</button>
      <p id="infoProgresoCard" style="margin-top:0.8rem; font-size:0.8rem;"></p>
    </div>
  </section>
  <footer>Memoria local · tus aciertos se guardan en el navegador · diseñado para fatiga visual baja</footer>
</div>

    [92, "Acta de reunión: verbos en pasado y acuerdos", "Se acordó replantear cota. Se revisó planificación. Acuerdo 1: adenda."],
    [93, "Descripción para redes sociales: directo y evocador", "Hormigón visto + luz cenital. Atmósfera casi sagrada."],
    [94, "Ficha de material: tabla + frase", "Pladur Aquaboard 120x240 cm. Colocar a trasdós de ducha."],
    [95, "Texto de panel expositivo: 15 palabras", "Fachada ventilada con panel HPL. Aislamiento lana de roca."],
    [96, "Leyenda de plano: coherencia", "E-01 Pilar metálico; E-02 Viga IPE; J-01 Junta dilatación."],
    [97, "Defensa ante tribunal: bullet points", "Estrategia pasiva: ventilación cruzada. Material reciclado 40%."],
    [98, "Síntesis ejecutiva de análisis urbano", "Diagnóstico: déficit zonas verdes. Propuesta: parque lineal 2 km."],
    [99, "Cita bibliográfica UNE-ISO 690", "ZUMTHOR, Peter. Pensar la arquitectura. Barcelona: Gustavo Gili, 2010."],
    [100, "Currículum vitae: logros medibles", "Proyecto 5 viviendas. Reducción 30% consumo. Tutoría 2 tesis."]
  ];

  // --------------------- ESTADO Y LOCALSTORAGE -------------------------
  let progreso = {};  // clave id (1..100): { aciertos, fallos, ultimaPractica }
  const STORAGE_KEY = "arqRedaccionProgreso";

  function cargarProgreso() {
    const guardado = localStorage.getItem(STORAGE_KEY);
    if(guardado) {
      progreso = JSON.parse(guardado);
    } else {
      progreso = {};
      for(let i=1; i<=100; i++) {
        progreso[i] = { aciertos: 0, fallos: 0, ultimaPractica: null };
      }
    }
  }
  function guardarProgreso() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progreso));
  }
  function registrarResultado(id, acierto) {
    if(!progreso[id]) progreso[id] = { aciertos:0, fallos:0, ultimaPractica: null };
    if(acierto) progreso[id].aciertos += 1;
    else progreso[id].fallos += 1;
    progreso[id].ultimaPractica = new Date().toISOString();
    guardarProgreso();
    renderDashboard();
    renderListado();   // actualiza listado badges
  }

  // ---- utilidades render ----
  let modoPractica = "tecnica_ejemplo"; // o "ejemplo_tecnica"
  let currentCardIndex = 0;
  let cardsArray = [];       // array de objetos { id, pregunta, respuestaCorrecta }
  let respuestaRevelada = false;
  let currentCardId = null;

  function construirCardsSegunModo() {
    cardsArray = tecnicasData.map(tec => {
      const id = tec[0];
      if(modoPractica === "tecnica_ejemplo") {
        return { id, pregunta: `📘 Técnica ${tec[0]}: ${tec[1]}`, respuestaCorrecta: tec[2] };
      } else {
        return { id, pregunta: `✍️ Ejemplo: "${tec[2].substring(0, 100)}${tec[2].length>100?'…':''}"`, respuestaCorrecta: `Técnica ${tec[0]}: ${tec[1]}` };
      }
    });
  }

  function actualizarCardUI() {
    const card = cardsArray[currentCardIndex];
    if(!card) return;
    currentCardId = card.id;
    document.getElementById("cardPregunta").innerHTML = card.pregunta;
    document.getElementById("respuestaDiv").innerHTML = `<strong>Respuesta:</strong><br>${card.respuestaCorrecta}`;
    document.getElementById("respuestaDiv").style.display = "none";
    respuestaRevelada = false;
    document.getElementById("aciertoBtn").disabled = true;
    document.getElementById("falloBtn").disabled = true;
    const infoProgress = progreso[card.id] || { aciertos:0, fallos:0 };
    document.getElementById("infoProgresoCard").innerHTML = `📊 Técnica ${card.id} · ✅ ${infoProgress.aciertos} aciertos · ❌ ${infoProgress.fallos} fallos`;
  }

  function mostrarRespuesta() {
    if(!respuestaRevelada) {
      document.getElementById("respuestaDiv").style.display = "block";
      respuestaRevelada = true;
      document.getElementById("aciertoBtn").disabled = false;
      document.getElementById("falloBtn").disabled = false;
    }
  }

  function siguienteTarjeta() {
    currentCardIndex = (currentCardIndex + 1) % cardsArray.length;
    actualizarCardUI();
  }

  function manejarAcierto() {
    if(currentCardId && respuestaRevelada) {
      registrarResultado(currentCardId, true);
      siguienteTarjeta();
    } else alert("Primero muestra la respuesta.");
  }
  function manejarFallo() {
    if(currentCardId && respuestaRevelada) {
      registrarResultado(currentCardId, false);
      siguienteTarjeta();
    } else alert("Primero muestra la respuesta.");
  }

  // RENDER DASHBOARD
  function renderDashboard() {
    let totalAciertos = 0, totalFallos = 0, tecnicasConAcierto = 0;
    for(let i=1; i<=100; i++) {
      const p = progreso[i] || {aciertos:0, fallos:0};
      totalAciertos += p.aciertos;
      totalFallos += p.fallos;
      if(p.aciertos > 0) tecnicasConAcierto++;
    }
    const porcentajeTecnicas = (tecnicasConAcierto/100)*100;
    document.getElementById("globalProgressFill").style.width = `${porcentajeTecnicas}%`;
    document.getElementById("globalProgressText").innerHTML = `${tecnicasConAcierto} de 100 técnicas registran al menos 1 acierto (${Math.round(porcentajeTecnicas)}%).`;
    document.getElementById("statsContainer").innerHTML = `
      <div class="stat-card"><div class="stat-number">${totalAciertos}</div>✅ Aciertos totales</div>
      <div class="stat-card"><div class="stat-number">${totalFallos}</div>❌ Fallos</div>
      <div class="stat-card"><div class="stat-number">${tecnicasConAcierto}</div>📘 Técnicas con acierto</div>
      <div class="stat-card"><div class="stat-number">${Math.round((totalAciertos/(totalAciertos+totalFallos+0.001))*100)}%</div>📈 Ratio acierto/fallo</div>
    `;
  }

  function renderListado(filtro="") {
    const container = document.getElementById("tecnicasListadoContainer");
    container.innerHTML = "";
    const filtroLower = filtro.toLowerCase();
    tecnicasData.forEach(tec => {
      const [id, tecnica, ejemplo] = tec;
      const prog = progreso[id] || {aciertos:0, fallos:0};
      if(filtro && !tecnica.toLowerCase().includes(filtroLower) && !ejemplo.toLowerCase().includes(filtroLower)) return;
      const div = document.createElement("div");
      div.className = "tecnica-item";
      div.innerHTML = `<div class="tecnica-titulo">${id}. ${tecnica}</div>
                       <div class="tecnica-ejemplo">📝 ${ejemplo.substring(0,140)}${ejemplo.length>140?'…':''}</div>
                       <span class="badge-progreso">✅ ${prog.aciertos} aciertos · ❌ ${prog.fallos} fallos</span>`;
      container.appendChild(div);
    });
  }

  function resetProgreso() {
    if(confirm("¿Reiniciar todo el progreso? Se perderán todos los aciertos y fallos.")) {
      for(let i=1;i<=100;i++) progreso[i] = { aciertos:0, fallos:0, ultimaPractica: null };
      guardarProgreso();
      renderDashboard();
      renderListado(document.getElementById("filtroListado")?.value || "");
      if(cardsArray.length) actualizarCardUI();
    }
  }

  // CAMBIO DE VISTAS
  function initNavigation() {
    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const viewId = btn.getAttribute("data-view");
        document.querySelectorAll(".view").forEach(v => v.classList.remove("active-view"));
        document.getElementById(viewId).classList.add("active-view");
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        if(viewId === "listado") renderListado(document.getElementById("filtroListado").value);
        if(viewId === "dashboard") renderDashboard();
        if(viewId === "practica") { construirCardsSegunModo(); currentCardIndex = 0; actualizarCardUI(); }
      });
    });
  }

  // EVENTOS DOM
  window.addEventListener("DOMContentLoaded", () => {
    cargarProgreso();
    construirCardsSegunModo();
    currentCardIndex = 0;
    actualizarCardUI();
    renderDashboard();
    renderListado();
    initNavigation();
    document.getElementById("modoTecnicaEjemplo").addEventListener("click", () => {
      modoPractica = "tecnica_ejemplo";
      construirCardsSegunModo();
      currentCardIndex = 0;
      actualizarCardUI();
      document.getElementById("modoTecnicaEjemplo").classList.add("btn-primary");
      document.getElementById("modoEjemploTecnica").classList.remove("btn-primary");
    });
    document.getElementById("modoEjemploTecnica").addEventListener("click", () => {
      modoPractica = "ejemplo_tecnica";
      construirCardsSegunModo();
      currentCardIndex = 0;
      actualizarCardUI();
      document.getElementById("modoEjemploTecnica").classList.add("btn-primary");
      document.getElementById("modoTecnicaEjemplo").classList.remove("btn-primary");
    });
    document.getElementById("mostrarRespuestaBtn").addEventListener("click", mostrarRespuesta);
    document.getElementById("aciertoBtn").addEventListener("click", manejarAcierto);
    document.getElementById("falloBtn").addEventListener("click", manejarFallo);
    document.getElementById("siguienteCardBtn").addEventListener("click", () => { siguienteTarjeta(); });
    document.getElementById("resetProgresoBtn").addEventListener("click", resetProgreso);
    const filtroInput = document.getElementById("filtroListado");
    if(filtroInput) filtroInput.addEventListener("input", (e) => renderListado(e.target.value));
  });
</script>
</body>
</html>
