{% extends 'base.html' %}
{% block title %}Registro · VerbalMaster{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">
  <div class="container-sm animate" style="width:100%">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-family:var(--font-display);font-size:2.5rem;font-weight:900;
        background:linear-gradient(135deg,var(--gold),var(--es));-webkit-background-clip:text;-webkit-text-fill-color:transparent">
        VerbalMaster
      </div>
      <div class="text-muted text-sm mt-1">Crea tu cuenta y empieza a aprender</div>
    </div>
    <div class="card">
      <div style="font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:1.2rem">Crear cuenta</div>
      <div id="err" class="alert alert-err hidden"></div>
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="username" placeholder="mi_usuario">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doRegister()">Crear cuenta →</button>
      <div class="separator"></div>
      <div class="text-sm text-muted" style="text-align:center">
        ¿Ya tienes cuenta? <a href="/login" style="color:var(--gold)">Inicia sesión</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function doRegister(){
  const u=document.getElementById('username').value.trim();
  const e=document.getElementById('email').value.trim();
  const p=document.getElementById('password').value;
  if(!u||!e||!p){showErr('Completa todos los campos');return}
  if(p.length<6){showErr('La contraseña debe tener al menos 6 caracteres');return}
  post('/register',{username:u,email:e,password:p}).then(d=>{
    if(d.ok) window.location=d.redirect;
    else showErr(d.msg||'Error');
  }).catch(()=>showErr('Error de conexión'));
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.remove('hidden')}
</script>
{% endblock %}
