<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lengua Castellana Educativa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Lengua Castellana</a>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="text-center mb-4">💡 Consejos y Lecciones Interactivas</h2>

    <div id="app" class="card shadow p-4">
      <h4 id="consejo" class="text-primary mb-3"></h4>

      <label for="respuesta" class="form-label">✍️ Escribe este consejo en inglés:</label>
      <input type="text" id="respuesta" class="form-control mb-3" placeholder="Write it here...">

      <button class="btn btn-success me-2" onclick="verificar()">Verificar</button>
      <button class="btn btn-secondary me-2" onclick="leerConsejo()">🔊 Escuchar</button>
      <button class="btn btn-primary" onclick="siguiente()">➡️ Siguiente</button>

      <div id="resultado" class="mt-3"></div>
    </div>
  </div>

  <footer class="text-center text-muted py-3">
    &copy; 2025 Proyecto Pedagógico de Lengua Castellana
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
