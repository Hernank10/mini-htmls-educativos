<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokenizador de Texto Educativo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="text-center mb-4">
      <h1 class="display-5 fw-bold text-primary">🧩 Tokenizador Pedagógico con NLTK</h1>
      <p class="lead">Aprende cómo las computadoras dividen el texto en palabras y oraciones.</p>
    </div>

    <div class="card shadow-lg p-4">
      <h4 class="mb-3">1️⃣ Escribe tu texto o selecciona un archivo (.txt o .docx)</h4>
      <form id="tokenForm" enctype="multipart/form-data">
        <textarea id="textInput" class="form-control mb-3" rows="5" placeholder="Escribe tu texto aquí..."></textarea>
        <input type="file" id="fileInput" class="form-control mb-3" accept=".txt,.docx">
        <button type="submit" class="btn btn-primary w-100">Tokenizar Texto</button>
      </form>
    </div>

    <div id="resultados" class="card shadow-lg p-4 mt-4 d-none">
      <h4 class="text-success">🔍 Resultados de la Tokenización</h4>
      <p><strong>Palabras encontradas:</strong></p>
      <div id="tokens" class="bg-white border rounded p-3 mb-3"></div>
      <p><strong>Oraciones detectadas:</strong></p>
      <div id="sentences" class="bg-white border rounded p-3"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
