<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lengua Castellana - Plataforma Educativa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <link rel="icon" href="assets/logo.png">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">
        <img src="assets/logo.png" alt="Logo" width="40" class="me-2">
        Lengua Castellana
      </a>
    </div>
  </nav>

  <!-- Header -->
  <header class="bg-primary text-white text-center py-5 mb-4">
    <div class="container">
      <h1 class="display-5 fw-bold">💡 100 Consejos y Lecciones Interactivas</h1>
      <p class="lead">Aprende, enseña y practica el buen uso del español con una experiencia pedagógica digital.</p>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="container">
    <div id="app" class="card shadow-lg p-4 border-0 rounded-4">
      <h4 id="consejo" class="text-primary mb-3 text-center fw-semibold"></h4>

      <div class="mb-3">
        <label for="respuesta" class="form-label fw-bold">✍️ Escribe este consejo en inglés:</label>
        <input type="text" id="respuesta" class="form-control form-control-lg" placeholder="Write it here...">
      </div>

      <div class="d-flex justify-content-center gap-2 mb-3">
        <button class="btn btn-success btn-lg" onclick="verificar()">
          <i class="bi bi-check-circle"></i> Verificar
        </button>
        <button class="btn btn-secondary btn-lg" onclick="leerConsejo()">
          🔊 Escuchar
        </button>
        <button class="btn btn-primary btn-lg" onclick="siguiente()">
          ➡️ Siguiente
        </button>
      </div>

      <div id="resultado" class="mt-3 text-center"></div>
      <div id="puntuacion" class="mt-2 text-center text-muted"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center text-muted py-4 mt-5 bg-white border-top">
    <p class="mb-0">
      © 2025 Proyecto Pedagógico de Lengua Castellana · Creado con ❤️ y Bootstrap 5
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
