{% extends "base.html" %}

{% block content %}
<div class="welcome-screen">
    <h2>¡Bienvenido al Juego de Inglés!</h2>
    <p>Aprende a identificar personas en inglés de forma divertida</p>
    
    <form action="{{ url_for('start_game') }}" method="post" class="login-form">
        <input type="text" name="name" placeholder="Ingresa tu nombre" required maxlength="20">
        <button type="submit">Comenzar Juego</button>
    </form>
    
    <div class="features">
        <h3>Características:</h3>
        <ul>
            <li>✅ 3 niveles progresivos</li>
            <li>✅ Sistema de puntos y vidas</li>
            <li>✅ Módulos de práctica</li>
            <li>✅ Rachas y bonificaciones</li>
        </ul>
    </div>
</div>
{% endblock %}
