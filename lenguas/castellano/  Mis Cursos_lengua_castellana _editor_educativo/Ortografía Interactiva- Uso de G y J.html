<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ortografía Interactiva: Uso de G y J</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .card { margin-top: 20px; border-radius: 1rem; }
    .btn { border-radius: 1rem; }
  </style>
</head>
<body>
<div class="container mt-4">
  <h1 class="text-center mb-4">📘 Ortografía Interactiva: Uso de G y J</h1>
  <p class="text-center text-muted">Practica las reglas de ortografía del español con ejercicios interactivos.</p>

  <div id="app" class="card shadow p-4">
    <h4 id="title">Regla 1: Verbos terminados en -ger y -gir</h4>
    <p id="sentence">Completa: No debemos ____(infringir) las reglas del juego.</p>
    <input id="answer" type="text" class="form-control mb-3" placeholder="Escribe tu respuesta aquí">
    <button class="btn btn-primary" onclick="checkAnswer()">Comprobar</button>
    <p id="feedback" class="mt-3 fw-bold"></p>
    <div class="progress mt-3">
      <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
    </div>
  </div>
</div>

<script>
const exercises = [
  { verb: "infringir", sentence: "No debemos ____(infringir) las reglas del juego." },
  { verb: "acoger", sentence: "Ella me ____(acoger) en su casa con amabilidad." },
  { verb: "afligir", sentence: "La noticia me ____(afligir) profundamente." },
  { verb: "escoger", sentence: "¿Cuál libro vas a ____(escoger)?" },
  { verb: "fingir", sentence: "No es bueno ____(fingir) emociones." },
  { verb: "encoger", sentence: "El gato se ____(encoger) de miedo." },
  { verb: "elegir", sentence: "Debes ____(elegir) sabiamente." },
  { verb: "dirigir", sentence: "Yo ____(dirigir) el proyecto con mi equipo." },
  { verb: "proteger", sentence: "Es importante ____(proteger) el medio ambiente." },
  { verb: "recoger", sentence: "Vamos a ____(recoger) la basura del parque." }
];

let index = 0;
let correct = 0;

function showExercise() {
  const ex = exercises[index];
  document.getElementById("title").innerText = `Ejercicio ${index + 1} de ${exercises.length}`;
  document.getElementById("sentence").innerText = ex.sentence;
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerText = "";
}

function checkAnswer() {
  const input = document.getElementById("answer").value.trim().toLowerCase();
  const correctVerb = exercises[index].verb;

  if (input.includes(correctVerb)) {
    document.getElementById("feedback").innerHTML = "✅ ¡Correcto!";
    correct++;
  } else {
    document.getElementById("feedback").innerHTML = `❌ Incorrecto. La forma correcta es: ${correctVerb}.`;
  }

  index++;
  const progress = (index / exercises.length) * 100;
  document.getElementById("progressBar").style.width = progress + "%";

  if (index < exercises.length) {
    setTimeout(showExercise, 1500);
  } else {
    document.getElementById("feedback").innerHTML += `<br><br>🎯 Has completado el ejercicio con ${correct} aciertos de ${exercises.length}.`;
  }
}

showExercise();
</script>

</body>
</html>
