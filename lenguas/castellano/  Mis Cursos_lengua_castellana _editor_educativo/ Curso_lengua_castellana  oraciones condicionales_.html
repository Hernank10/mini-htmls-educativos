<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aprende y Memoriza Oraciones Condicionales</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="text-center mb-4">
      <h1 class="fw-bold text-primary">💬 Oraciones Condicionales Interactivas</h1>
      <p class="text-muted">Aprende, practica y crea tus propios ejemplos para memorizar mejor.</p>
    </div>

    <!-- Menú principal -->
    <div class="d-flex flex-wrap justify-content-center gap-3 mb-4">
      <button class="btn btn-primary" onclick="mostrarEnsayo()">📘 Leer teoría</button>
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalAgregar">➕ Añadir ejemplo</button>
      <button class="btn btn-info text-white" onclick="verEjemplos()">📂 Ver ejemplos</button>
      <button class="btn btn-warning" onclick="practicar()">📝 Practicar</button>
      <button class="btn btn-danger" onclick="borrarTodo()">🗑️ Reiniciar</button>
    </div>

    <!-- Mensaje dinámico -->
    <div id="mensaje" class="alert alert-info d-none"></div>

    <!-- Sección de puntaje -->
    <div id="score" class="text-center mt-3 text-success fw-bold"></div>
  </div>

  <!-- Modal: Añadir ejemplo -->
  <div class="modal fade" id="modalAgregar" tabindex="-1" aria-labelledby="modalAgregarLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">Nuevo ejemplo condicional</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="formEjemplo">
            <div class="mb-3">
              <label class="form-label">Oración incompleta</label>
              <input type="text" class="form-control" id="incompleta" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Respuesta esperada</label>
              <input type="text" class="form-control" id="respuesta" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Tipo de condicional</label>
              <select id="tipo" class="form-select" required>
                <option value="">Selecciona...</option>
                <option value="Real">Real</option>
                <option value="Irreal">Irreal</option>
                <option value="Potencial">Potencial</option>
              </select>
            </div>
            <button type="submit" class="btn btn-success w-100">Guardar ejemplo</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Ver ejemplos -->
  <div class="modal fade" id="modalVer" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-info text-white">
          <h5 class="modal-title">Ejemplos guardados</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="listaEjemplos"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
