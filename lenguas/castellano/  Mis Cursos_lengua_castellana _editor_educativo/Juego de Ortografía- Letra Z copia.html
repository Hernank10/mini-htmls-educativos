<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Ortografía: Letra Z</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">
        <header class="text-center mb-4">
            <h1 class="display-4 text-success">¡Domina la Letra Z! 🧠</h1>
            <p class="lead">Practica ortografía creando frases ingeniosas.</p>
        </header>

        <div class="row mb-3">
            <div class="col-md-6">
                <div class="alert alert-info" role="alert">
                    <strong>Puntuación:</strong> <span id="puntaje">0</span>
                </div>
            </div>
            <div class="col-md-6">
                <div class="alert alert-warning" role="alert">
                    <strong>Nivel Actual:</strong> <span id="nivelTexto">Básico</span>
                </div>
            </div>
        </div>

        <div class="card shadow-lg border-success mb-4">
            <div class="card-header bg-success text-white">
                <h4 id="tituloDesafio">Desafío de la Palabra</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-4 mb-4" id="textoDesafio">Crea una frase con la palabra: **ZORRO**</p>
                
                <textarea id="respuestaUsuario" class="form-control mb-3" rows="3" placeholder="Escribe tu frase aquí..."></textarea>
                
                <button id="btnEnviar" class="btn btn-lg btn-primary w-100">Enviar Respuesta y Ver Puntuación</button>

            </div>
        </div>

        <div id="retroalimentacion" class="p-3 border rounded d-none">
            </div>

        <div class="d-flex justify-content-between align-items-center mt-4 mb-5">
            <label for="selectorNivel" class="me-2">Cambiar Nivel:</label>
            <select id="selectorNivel" class="form-select w-auto">
                <option value="1">Básico</option>
                <option value="2">Intermedio</option>
                <option value="3">Avanzado</option>
            </select>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Aquí iría tu lógica JS para manejar el puntaje, los desafíos, etc.
        console.log("La estructura HTML está lista para la lógica JavaScript.");
    </script>
</body>
</html>
