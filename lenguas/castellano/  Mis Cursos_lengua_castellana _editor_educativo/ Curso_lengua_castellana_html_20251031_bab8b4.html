<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro de Castellano</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .hero {
            background: linear-gradient(135deg, #0d6efd 0%, #4e54c8 100%);
        }
        .exercise-card {
            transition: transform 0.3s ease;
        }
        .exercise-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-book me-2"></i>Maestro de Castellano
            </a>
        </div>
    </nav>

    <section class="hero text-white py-5">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">Domina la Gramática Española</h1>
            <p class="lead">100 lecciones interactivas con ejercicios prácticos</p>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-4">Lecciones Disponibles</h2>
            <div id="lessons-container" class="row">
                <!-- Lecciones se cargan aquí dinámicamente -->
            </div>
        </div>
    </section>

    <section class="bg-light py-5">
        <div class="container">
            <h2 class="text-center mb-4">Práctica en Tiempo Real</h2>
            <div class="card">
                <div class="card-body">
                    <div id="exercise-area">
                        <p class="text-center text-muted">Selecciona una lección para comenzar</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        class MaestroApp {
            constructor() {
                this.apiBase = 'http://localhost:8000/api';
                this.wsUrl = 'ws://localhost:8000/ws/practice';
                this.socket = null;
                this.init();
            }

            async init() {
                await this.loadLessons();
                this.setupWebSocket();
            }

            async loadLessons() {
                try {
                    const response = await fetch(`${this.apiBase}/lessons`);
                    const data = await response.json();
                    this.renderLessons(data.lessons);
                } catch (error) {
                    console.error('Error cargando lecciones:', error);
                }
            }

            renderLessons(lessons) {
                const container = document.getElementById('lessons-container');
                container.innerHTML = lessons.map(lesson => `
                    <div class="col-md-4 mb-4">
                        <div class="card exercise-card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${lesson.title}</h5>
                                <p class="card-text">${lesson.description}</p>
                                <span class="badge bg-primary">${lesson.level}</span>
                            </div>
                            <div class="card-footer">
                                <button class="btn btn-primary w-100" onclick="app.startLesson(${lesson.id})">
                                    Comenzar Lección
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            async startLesson(lessonId) {
                try {
                    const response = await fetch(`${this.apiBase}/lessons/${lessonId}/exercises`);
                    const data = await response.json();
                    this.renderExercise(data.exercises[0]);
                } catch (error) {
                    console.error('Error cargando ejercicio:', error);
                }
            }

            renderExercise(exercise) {
                const area = document.getElementById('exercise-area');
                area.innerHTML = `
                    <h4>${exercise.question}</h4>
                    <div class="mt-3">
                        ${exercise.options.map((option, index) => `
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="exercise" id="opt${index}" value="${index}">
                                <label class="form-check-label" for="opt${index}">
                                    ${option}
                                </label>
                            </div>
                        `).join('')}
                    </div>
                    <button class="btn btn-success mt-3" onclick="app.submitExercise(${exercise.id})">
                        Enviar Respuesta
                    </button>
                `;
            }

            setupWebSocket() {
                this.socket = new WebSocket(this.wsUrl);
                
                this.socket.onopen = () => {
                    console.log('Conectado al WebSocket');
                };

                this.socket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    this.handleWebSocketMessage(data);
                };

                this.socket.onclose = () => {
                    console.log('Conexión WebSocket cerrada');
                };
            }

            submitExercise(exerciseId) {
                const selected = document.querySelector('input[name="exercise"]:checked');
                if (!selected) {
                    alert('Selecciona una respuesta');
                    return;
                }

                const message = {
                    type: 'exercise_submission',
                    exercise_id: exerciseId,
                    answer: parseInt(selected.value)
                };

                this.socket.send(JSON.stringify(message));
            }

            handleWebSocketMessage(data) {
                if (data.type === 'correction') {
                    alert(data.feedback);
                }
            }
        }

        // Inicializar aplicación
        const app = new MaestroApp();
    </script>
</body>
</html>
