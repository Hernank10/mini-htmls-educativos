{% extends 'base.html' %}
{% block content %}
<h3>🧩 Ejercicios de {{ leccion.titulo }}</h3>
<ul>
  {% for e in leccion.ejercicios %}
  <li>{{ e }}</li>
  {% endfor %}
</ul>

<div class="mt-4">
  <label for="respuesta">Tu respuesta:</label>
  <input type="text" id="respuesta" class="form-control w-50" placeholder="Escribe aquí...">
  <button class="btn btn-primary mt-2" onclick="enviarRespuesta()">Enviar</button>
  <p id="resultado" class="mt-3 fw-bold"></p>
</div>

<script>
function enviarRespuesta() {
  const respuesta = document.getElementById('respuesta').value;
  fetch('/api/responder', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ respuesta })
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById('resultado').innerText = data.resultado;
  });
}
</script>
{% endblock %}
