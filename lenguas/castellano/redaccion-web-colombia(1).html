<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redacción Web · Colombia Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{
  --paper:#fefcf7;
  --ink:#1a1209;
  --warm:#f5f0e6;
  --rule:#d4c9b0;
  --vivid:#e8392a;
  --sun:#f7c948;
  --leaf:#2a9d4e;
  --ocean:#1b6ca8;
  --orchid:#8b2fc9;
  --muted:#7a6e5f;
  --card-shadow:6px 6px 0 var(--ink);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}

body{
  background:var(--paper);
  font-family:'DM Sans',sans-serif;
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── decorative lines ── */
body::before{
  content:'';position:fixed;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(212,201,176,.35) 39px,rgba(212,201,176,.35) 40px);
  pointer-events:none;z-index:0;
}

/* ══════════════ HEADER ══════════════ */
.hdr{
  position:sticky;top:0;z-index:200;
  background:var(--ink);
  border-bottom:4px solid var(--vivid);
}
.hdr-top{
  max-width:1300px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;gap:16px;flex-wrap:wrap;
}
.logo{
  font-family:'Fraunces',serif;font-weight:900;
  font-size:clamp(1.2rem,3vw,1.9rem);
  color:var(--paper);line-height:1;letter-spacing:-.5px;
}
.logo sup{
  font-size:.38em;background:var(--vivid);color:#fff;
  border-radius:2px;padding:2px 5px;vertical-align:top;margin-top:4px;
  font-family:'DM Mono',monospace;font-weight:400;letter-spacing:1px;
}
.logo span{color:var(--sun);}

.hdr-meta{
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
}
.hdr-date{
  font-family:'DM Mono',monospace;font-size:10px;
  color:rgba(254,252,247,.45);letter-spacing:1.5px;
  text-transform:uppercase;
}
.hdr-prog-wrap{min-width:160px;}
.hdr-prog-lbl{
  font-family:'DM Mono',monospace;font-size:9px;
  color:rgba(254,252,247,.5);letter-spacing:1px;
  display:flex;justify-content:space-between;margin-bottom:4px;
}
.hdr-prog-track{height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.hdr-prog-fill{height:100%;background:var(--sun);border-radius:2px;transition:width .6s ease;}

/* ══════════════ MODE TABS ══════════════ */
.modetabs{background:var(--warm);border-bottom:2px solid var(--rule);}
.modetabs-inner{max-width:1300px;margin:0 auto;display:flex;padding:0 24px;overflow-x:auto;}
.mtab{
  padding:12px 24px;font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  border:none;background:transparent;cursor:pointer;
  border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;
}
.mtab:hover{color:var(--ink);}
.mtab.on{color:var(--vivid);border-bottom-color:var(--vivid);}

/* ══════════════ MAIN ══════════════ */
.main{
  max-width:1300px;margin:0 auto;
  padding:28px 20px;position:relative;z-index:1;
}

/* ══════════════ FILTER BAR ══════════════ */
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.ftag{
  padding:5px 14px;border-radius:20px;
  border:1.5px solid var(--ink);background:transparent;
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.5px;
  cursor:pointer;color:var(--ink);transition:all .2s;
}
.ftag:hover,.ftag.on{background:var(--ink);color:var(--paper);}
.ftag.t-vivid{border-color:var(--vivid);}
.ftag.t-vivid:hover,.ftag.t-vivid.on{background:var(--vivid);color:#fff;border-color:var(--vivid);}
.ftag.t-leaf{border-color:var(--leaf);}
.ftag.t-leaf:hover,.ftag.t-leaf.on{background:var(--leaf);color:#fff;border-color:var(--leaf);}
.ftag.t-ocean{border-color:var(--ocean);}
.ftag.t-ocean:hover,.ftag.t-ocean.on{background:var(--ocean);color:#fff;border-color:var(--ocean);}
.ftag.t-orchid{border-color:var(--orchid);}
.ftag.t-orchid:hover,.ftag.t-orchid.on{background:var(--orchid);color:#fff;border-color:var(--orchid);}
.ftag.t-sun{border-color:#b89000;}
.ftag.t-sun:hover,.ftag.t-sun.on{background:var(--sun);color:var(--ink);border-color:var(--sun);}

.fsrch{
  padding:6px 16px;border-radius:20px;
  border:1.5px solid var(--rule);background:var(--warm);
  font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink);
  outline:none;width:200px;
}
.fsrch:focus{border-color:var(--vivid);}
.fsrch::placeholder{color:var(--muted);}
.freset{
  margin-left:auto;padding:5px 14px;border-radius:20px;
  border:1.5px solid var(--vivid);background:transparent;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--vivid);
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;
}
.freset:hover{background:var(--vivid);color:#fff;}

/* stats ribbon */
.ribbon{
  display:flex;gap:20px;flex-wrap:wrap;
  padding:8px 16px;margin-bottom:24px;
  background:var(--ink);color:var(--paper);
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;
  border-radius:2px;
}
.ribbon b{color:var(--sun);}

/* ══════════════ FLASHCARD ══════════════ */
#mflash{display:block;}
#mlist{display:none;}

.fstage{display:flex;flex-direction:column;align-items:center;gap:20px;}
.fcount{
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--muted);letter-spacing:3px;
}

.flashcard{
  width:100%;max-width:760px;
  perspective:1400px;cursor:pointer;
}
.card-inner{
  position:relative;width:100%;min-height:380px;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.35,0,.2,1);
}
.flashcard.flipped .card-inner{transform:rotateY(180deg);}

.cface{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  padding:38px 44px;
  display:flex;flex-direction:column;justify-content:center;
  border-radius:3px;
}

/* FRONT — warm paper */
.cfront{
  background:var(--warm);
  border:2px solid var(--ink);
  box-shadow:var(--card-shadow);
}
/* ruled lines on front */
.cfront::after{
  content:'';position:absolute;inset:0;border-radius:3px;
  background:repeating-linear-gradient(180deg,transparent,transparent 27px,rgba(212,201,176,.5) 27px,rgba(212,201,176,.5) 28px);
  pointer-events:none;
}

/* BACK — vivid */
.cback{
  background:var(--ink);
  border:2px solid var(--ink);
  transform:rotateY(180deg);
  box-shadow:var(--card-shadow);
}

.cnum{
  position:absolute;top:14px;right:18px;
  font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);
}
.cback .cnum{color:rgba(254,252,247,.3);}

.ctag{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:7px;
}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* category colors */
.tc-WEB  {color:var(--vivid);}   .td-WEB  {background:var(--vivid);}
.tc-SEO  {color:var(--leaf);}    .td-SEO  {background:var(--leaf);}
.tc-UX   {color:var(--ocean);}   .td-UX   {background:var(--ocean);}
.tc-COPY {color:var(--orchid);}  .td-COPY {background:var(--orchid);}
.tc-CONT {color:#b89000;}        .td-CONT {background:var(--sun);}
.tc-ESTR {color:#1a6b6b;}        .td-ESTR {background:#1a9999;}

.ctech{
  font-family:'Fraunces',serif;font-weight:700;
  font-size:clamp(1.1rem,3vw,1.5rem);
  margin-bottom:10px;line-height:1.2;position:relative;z-index:1;
}
.cdef{font-size:13.5px;line-height:1.7;color:var(--muted);position:relative;z-index:1;}
.flip-hint{
  margin-top:22px;font-family:'DM Mono',monospace;font-size:9px;
  color:rgba(122,110,95,.5);letter-spacing:2px;text-transform:uppercase;
  position:relative;z-index:1;
}

.cback .ctag{opacity:.7;}
.ex-lbl{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:var(--sun);margin-bottom:8px;
}
.ex-quote{
  font-family:'Fraunces',serif;font-size:14px;font-style:italic;
  line-height:1.65;color:rgba(254,252,247,.88);
  border-left:3px solid var(--sun);padding-left:14px;
  margin-bottom:18px;font-weight:300;
}

/* ── EXERCISE ── */
.exarea{padding-top:16px;border-top:1px solid rgba(254,252,247,.12);}
.exhdr{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;
  text-transform:uppercase;color:var(--vivid);
  margin-bottom:9px;display:flex;align-items:center;gap:6px;
}

.dropzone{
  display:flex;flex-wrap:wrap;gap:5px;min-height:42px;
  border:1.5px dashed rgba(247,201,72,.3);border-radius:3px;
  padding:7px;margin-bottom:7px;transition:all .2s;
}
.dropzone.over{border-color:var(--sun);background:rgba(247,201,72,.05);}

.wbank{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}

.chip{
  padding:4px 12px;border-radius:20px;cursor:grab;
  font-family:'DM Mono',monospace;font-size:11px;
  user-select:none;transition:all .15s;
  border:1.5px solid rgba(254,252,247,.2);
  background:rgba(254,252,247,.06);color:rgba(254,252,247,.8);
}
.chip:active{cursor:grabbing;opacity:.6;}
.chip.indrop{
  background:rgba(247,201,72,.15);border-color:rgba(247,201,72,.6);
  color:var(--sun);cursor:grab;
}

.exacts{display:flex;gap:7px;flex-wrap:wrap;}
.xbtn{
  padding:4px 14px;border-radius:20px;
  font-family:'DM Mono',monospace;font-size:10px;
  cursor:pointer;transition:all .2s;border:1.5px solid;
}
.xbtn.chk{border-color:var(--leaf);color:var(--leaf);background:transparent;}
.xbtn.chk:hover{background:rgba(42,157,78,.2);}
.xbtn.rst{border-color:rgba(254,252,247,.2);color:rgba(254,252,247,.45);background:transparent;}
.xbtn.rst:hover{border-color:rgba(254,252,247,.4);color:rgba(254,252,247,.7);}
.exfb{
  font-family:'DM Mono',monospace;font-size:10px;
  margin-top:6px;min-height:16px;letter-spacing:.5px;
}
.exfb.ok{color:#4ade80;}
.exfb.err{color:#ff7b6e;}

/* ── FLASH NAV ── */
.fnav{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.nbtn{
  padding:9px 22px;border-radius:2px;border:2px solid var(--ink);
  background:transparent;font-family:'DM Mono',monospace;font-size:11px;
  cursor:pointer;color:var(--ink);transition:all .2s;
  display:flex;align-items:center;gap:6px;letter-spacing:.5px;
}
.nbtn:hover{background:var(--ink);color:var(--paper);}
.nbtn.mark{border-color:var(--leaf);color:var(--leaf);}
.nbtn.mark:hover,.nbtn.mark.done{background:var(--leaf);color:#fff;}
.nbtn.done{background:var(--leaf);color:#fff;border-color:var(--leaf);}
.nbtn:disabled{opacity:.25;cursor:not-allowed;}

/* ══════════════ LIST MODE ══════════════ */
.lgrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:20px;
}
.lcard{
  background:var(--warm);border:2px solid var(--ink);border-radius:3px;
  overflow:hidden;box-shadow:4px 4px 0 var(--rule);
  transition:all .2s;
}
.lcard:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--rule);}
.lcard.done{border-color:var(--leaf);box-shadow:4px 4px 0 rgba(42,157,78,.3);}
.lcard.done:hover{box-shadow:6px 6px 0 rgba(42,157,78,.3);}

.lc-hdr{
  background:var(--ink);color:var(--paper);
  padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.lc-num{font-family:'DM Mono',monospace;font-size:9px;opacity:.4;margin-right:auto;}
.lc-badge{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1.5px;
  text-transform:uppercase;padding:2px 9px;border-radius:20px;
}
.lb-WEB {background:var(--vivid);color:#fff;}
.lb-SEO {background:var(--leaf);color:#fff;}
.lb-UX  {background:var(--ocean);color:#fff;}
.lb-COPY{background:var(--orchid);color:#fff;}
.lb-CONT{background:var(--sun);color:var(--ink);}
.lb-ESTR{background:#1a9999;color:#fff;}

.done-pill{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;
  background:var(--leaf);color:#fff;border-radius:20px;padding:2px 8px;
}
.lc-body{padding:14px;}
.lc-tech{font-family:'Fraunces',serif;font-weight:700;font-size:.98rem;margin-bottom:5px;}
.lc-def{font-size:11.5px;color:var(--muted);line-height:1.6;margin-bottom:8px;}
.lc-ex{
  font-size:11.5px;font-style:italic;color:var(--ink);
  border-left:3px solid var(--vivid);padding-left:10px;
  margin-bottom:12px;line-height:1.55;
}

.lc-xzone{
  background:var(--ink);border-radius:3px;padding:11px;
}
.lc-xhdr{
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:2px;
  text-transform:uppercase;color:var(--sun);margin-bottom:7px;
}
.lc-drop{
  display:flex;flex-wrap:wrap;gap:4px;min-height:34px;
  border:1.5px dashed rgba(247,201,72,.25);border-radius:3px;
  padding:5px;margin-bottom:6px;transition:all .2s;
}
.lc-drop.over{border-color:var(--sun);background:rgba(247,201,72,.04);}
.lc-bank{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.lchip{
  padding:3px 10px;border-radius:20px;cursor:grab;
  font-family:'DM Mono',monospace;font-size:10px;
  user-select:none;border:1.5px solid rgba(254,252,247,.18);
  background:rgba(254,252,247,.06);color:rgba(254,252,247,.75);
  transition:all .15s;
}
.lchip:active{cursor:grabbing;opacity:.6;}
.lchip.indrop{background:rgba(247,201,72,.15);border-color:rgba(247,201,72,.5);color:var(--sun);}
.lc-acts{display:flex;gap:6px;}
.lxbtn{
  padding:3px 12px;border-radius:20px;border:1.5px solid;
  font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .2s;
}
.lxbtn.chk{border-color:var(--leaf);color:var(--leaf);background:transparent;}
.lxbtn.chk:hover{background:rgba(42,157,78,.2);}
.lxbtn.rst{border-color:rgba(254,252,247,.15);color:rgba(254,252,247,.4);background:transparent;}
.lxbtn.rst:hover{border-color:rgba(254,252,247,.35);}
.lcfb{font-family:'DM Mono',monospace;font-size:9px;margin-top:5px;min-height:14px;}
.lcfb.ok{color:#4ade80;}.lcfb.err{color:#ff7b6e;}

/* empty */
.emptybox{text-align:center;padding:60px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

/* ── animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fstage,.lcard{animation:fadeUp .35s ease both;}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--warm);}
::-webkit-scrollbar-thumb{background:var(--rule);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

@media(max-width:600px){
  .cface{padding:22px 18px;}
  .mtab{padding:10px 14px;font-size:9px;}
  .hdr-date{display:none;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-top">
    <div class="logo">
      Redacción<span>Web</span><sup>CO</sup>
    </div>
    <div class="hdr-meta">
      <div class="hdr-date">Colombia · Edición Digital</div>
      <div class="hdr-prog-wrap">
        <div class="hdr-prog-lbl">
          <span>AVANCE</span><span><b id="pc">0</b>/100</span>
        </div>
        <div class="hdr-prog-track">
          <div class="hdr-prog-fill" id="pf" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- MODE TABS -->
<nav class="modetabs">
  <div class="modetabs-inner">
    <button class="mtab on" id="t-flash" onclick="setMode('flash')">
      <i class="bi bi-card-heading"></i> Flashcards
    </button>
    <button class="mtab" id="t-list" onclick="setMode('list')">
      <i class="bi bi-grid-3x2-gap-fill"></i> Lista de técnicas
    </button>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- FILTER BAR -->
  <div class="fbar">
    <button class="ftag on" onclick="setFilter('all',this)">Todas</button>
    <button class="ftag t-vivid" onclick="setFilter('WEB',this)">Redacción Web</button>
    <button class="ftag t-leaf" onclick="setFilter('SEO',this)">SEO / Búsqueda</button>
    <button class="ftag t-ocean" onclick="setFilter('UX',this)">UX Writing</button>
    <button class="ftag t-orchid" onclick="setFilter('COPY',this)">Copywriting</button>
    <button class="ftag t-sun" onclick="setFilter('CONT',this)">Contenidos</button>
    <button class="ftag t-estr" onclick="setFilter('ESTR',this)" style="border-color:#1a6b6b;color:#1a6b6b">Estructura</button>
    <input class="fsrch" id="srch" type="text" placeholder="🔍 Buscar técnica…" oninput="doSearch(this.value)">
    <button class="freset" onclick="resetAll()"><i class="bi bi-arrow-counterclockwise"></i> Reiniciar</button>
  </div>

  <!-- STATS RIBBON -->
  <div class="ribbon">
    <span>Completadas: <b id="sd">0</b></span>
    <span>Pendientes: <b id="sp">100</b></span>
    <span>Filtro: <b id="sf">todas (100)</b></span>
  </div>

  <!-- FLASHCARD MODE -->
  <div id="mflash">
    <div class="fstage">
      <div class="fcount" id="fcc">001 / 100</div>

      <div class="flashcard" id="FC" onclick="flipCard(event)">
        <div class="card-inner" id="CI">

          <!-- FRONT -->
          <div class="cface cfront">
            <div class="cnum" id="cfn">001</div>
            <div class="ctag" id="cft"></div>
            <div class="ctech" id="cftc"></div>
            <div class="cdef" id="cfdf"></div>
            <div class="flip-hint">▸ toca para ver ejemplo y ejercicio</div>
          </div>

          <!-- BACK -->
          <div class="cface cback">
            <div class="cnum" id="cbn">001</div>
            <div class="ctag" id="cbt"></div>
            <div class="ex-lbl">EJEMPLO</div>
            <div class="ex-quote" id="ceq"></div>
            <div class="exarea">
              <div class="exhdr"><i class="bi bi-puzzle-fill"></i> RECONSTRUYE LA ORACIÓN</div>
              <div class="dropzone" id="cdrop"
                ondragover="dO(event)" ondrop="dDrop(event,'cdrop')" ondragleave="dL(event)"></div>
              <div class="wbank" id="cbank"></div>
              <div class="exacts">
                <button class="xbtn chk" onclick="chkCard(event)">Verificar</button>
                <button class="xbtn rst" onclick="rstCard(event)">Reiniciar</button>
              </div>
              <div class="exfb" id="cfb"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="fnav">
        <button class="nbtn" id="bprev" onclick="nav(-1)" disabled>
          <i class="bi bi-arrow-left"></i> Anterior
        </button>
        <button class="nbtn mark" id="bmark" onclick="toggleMark()">
          <i class="bi bi-check2"></i> Marcar
        </button>
        <button class="nbtn" id="bnext" onclick="nav(1)">
          Siguiente <i class="bi bi-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- LIST MODE -->
  <div id="mlist" style="display:none">
    <div class="lgrid" id="lgrid"></div>
    <div class="emptybox" id="empt" style="display:none">
      <i class="bi bi-search" style="font-size:2rem;opacity:.3"></i><br>Sin resultados con ese filtro.
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════
   100 FLASHCARDS — REDACCIÓN WEB COLOMBIA
   Categorías: WEB · SEO · UX · COPY · CONT · ESTR

{id:39,cat:"UX",catN:"UX Writing",

{id:40,cat:"UX",catN:"UX Writing",

{id:42,cat:"UX",catN:"UX Writing",

{id:44,cat:"UX",catN:"UX Writing",
tech:"Microcopy de alerta destructiva",
def:"Texto de confirmación antes de una acción irreversible que explica las consecuencias y ofrece opciones claras.",

{id:45,cat:"UX",catN:"UX Writing",
tech:"Texto de carga o espera",

{id:46,cat:"UX",catN:"UX Writing",
tech:"Notificación push útil y no invasiva",

{id:47,cat:"UX",catN:"UX Writing",

{id:48,cat:"UX",catN:"UX Writing",

{id:49,cat:"UX",catN:"UX Writing",

{id:50,cat:"UX",catN:"UX Writing",

/* ── COPY: Copywriting (15) ── */
{id:51,cat:"COPY",catN:"Copywriting",
tech:"Titular con fórmula Cómo-Número-Resultado",

{id:52,cat:"COPY",catN:"Copywriting",
tech:"Propuesta de valor única (UVP)",
def:"Enunciado de una oración que comunica qué ofrece la marca, a quién, y por qué es diferente a la competencia.",

{id:53,cat:"COPY",catN:"Copywriting",
tech:"Llamada a la acción (CTA) urgente",
def:"Enunciado que invita al usuario a actuar de inmediato, usando verbos fuertes y marcando límite de tiempo o disponibilidad.",
example:"Reserva tu cupo antes del viernes: solo quedan doce plazas para el bootcamp de programación con beca del ochenta por ciento en Bogotá.",

{id:54,cat:"COPY",catN:"Copywriting",
tech:"Prueba social con testimonio específico",
def:"Cita o referencia a la experiencia de un cliente real con nombre, contexto y resultado cuantificable.",
example:"Carolina López, diseñadora de Barranquilla: 'Gracias a Workana conseguí tres clientes internacionales en dos meses y triupliqué mis ingresos sin moverme de Colombia.'",
words:["Carolina","López,","diseñadora","de","Barranquilla:","'Gracias","a","Workana","conseguí","tres","clientes","internacionales","en","dos","meses","y","triupliqué","mis","ingresos","sin","moverme","de","Colombia.'"]},

{id:55,cat:"COPY",catN:"Copywriting",
tech:"Apertura con historia (storytelling)",
def:"Párrafo que inicia con una anécdota o situación concreta que el lector reconoce como propia, creando conexión inmediata.",
example:"Camila tenía 28 años, tres años de experiencia como contadora y un diploma en su pared. Pero en 2022 no encontraba empleo en Bogotá hasta que descubrió que su hoja de vida la estaba eliminando antes de llegar a un humano.",
words:["Camila","tenía","28","años,","tres","años","de","experiencia","como","contadora","y","un","diploma","en","su","pared.","Pero","en","2022","no","encontraba","empleo","en","Bogotá","hasta","que","descubrió","que","su","hoja","de","vida","la","estaba","eliminando","antes","de","llegar","a","un","humano."]},

{id:56,cat:"COPY",catN:"Copywriting",
tech:"Miedo, incertidumbre y duda (FUD) ético",
def:"Texto que alerta sobre un riesgo real del lector para motivar la acción, sin exagerar ni manipular.",
example:"El DIAN inició en 2023 auditorías automáticas a cuentas bancarias con más de ocho millones de pesos en depósitos anuales. Si no has declarado ese dinero, podrías enfrentar una sanción de hasta el doscientos por ciento.",
words:["El","DIAN","inició","en","2023","auditorías","automáticas","a","cuentas","bancarias","con","más","de","ocho","millones","de","pesos","en","depósitos","anuales.","Si","no","has","declarado","ese","dinero,","podrías","enfrentar","una","sanción","de","hasta","el","doscientos","por","ciento."]},

{id:57,cat:"COPY",catN:"Copywriting",
tech:"Beneficio emocional + racional en un párrafo",
def:"Texto que combina el beneficio tangible y el emocional de un producto, apelando a la razón y al sentimiento a la vez.",
example:"Con el plan de salud complementario de Colsánitas duermes tranquilo sabiendo que, si algo le pasa a tu familia, tendrán médicos de primer nivel sin esperas y sin sorpresas en la factura.",
words:["Con","el","plan","de","salud","complementario","de","Colsánitas","duermes","tranquilo","sabiendo","que,","si","algo","le","pasa","a","tu","familia,","tendrán","médicos","de","primer","nivel","sin","esperas","y","sin","sorpresas","en","la","factura."]},

{id:58,cat:"COPY",catN:"Copywriting",
tech:"Garantía que elimina objeción",
def:"Enunciado que elimina el principal miedo del comprador ofreciendo una garantía específica y creíble.",
example:"Si no mejoras tu inglés en sesenta días con el método de Open English, te devolvemos el cien por ciento de tu dinero. Sin preguntas, sin formularios, en setenta y dos horas.",
words:["Si","no","mejoras","tu","inglés","en","sesenta","días","con","el","método","de","Open","English,","te","devolvemos","el","cien","por","ciento","de","tu","dinero.","Sin","preguntas,","sin","formularios,","en","setenta","y","dos","horas."]},

{id:59,cat:"COPY",catN:"Copywriting",
tech:"Escasez y exclusividad como motivador",
def:"Texto que destaca la limitación de stock, tiempo o acceso para generar urgencia en el usuario indeciso.",
example:"Solo cien empresas colombianas podrán acceder al programa de aceleración del iNNpulsa este semestre. Las inscripciones cierran el próximo jueves a medianoche.",
words:["Solo","cien","empresas","colombianas","podrán","acceder","al","programa","de","aceleración","del","iNNpulsa","este","semestre.","Las","inscripciones","cierran","el","próximo","jueves","a","medianoche."]},

{id:60,cat:"COPY",catN:"Copywriting",
tech:"Párrafo de credencial de marca",
def:"Texto que posiciona a la empresa citando su trayectoria, clientes o reconocimientos de forma no arrogante.",
example:"Más de cuatrocientas empresas colombianas confían en Siigo para su contabilidad, desde tiendas de barrio en Medellín hasta pymes exportadoras del sector floricultor del Eje Cafetero.",
words:["Más","de","cuatrocientas","empresas","colombianas","confían","en","Siigo","para","su","contabilidad,","desde","tiendas","de","barrio","en","Medellín","hasta","pymes","exportadoras","del","sector","floricultor","del","Eje","Cafetero."]},

{id:61,cat:"COPY",catN:"Copywriting",
tech:"Párrafo de objeción anticipada",
def:"Texto que prevé la duda más común del lector y la responde antes de que se convierta en barrera para la acción.",
example:"¿Crees que los cursos online no funcionan? Entendemos la desconfianza. Por eso nuestras clases de diseño gráfico tienen instructor colombiano en vivo, ejercicios con feedback real y comunidad activa de egresados.",

{id:62,cat:"COPY",catN:"Copywriting",
tech:"Lista de beneficios con poder de escaneo",
def:"Enumeración en prosa de tres a cinco ventajas concretas, cada una iniciando con un verbo de acción orientado al usuario.",
example:"Con tu cuenta de Bancolombia Digital ahorras tiempo pagando sin ir al banco, controlas tus gastos con estadísticas automáticas, transfieres a cualquier banco sin costo y recibes alertas en tiempo real.",

{id:63,cat:"COPY",catN:"Copywriting",
tech:"Frase de cierre memorizable (tagline)",
def:"Enunciado corto, rítmico y evocador que resume la esencia de una marca o campaña en máximo siete palabras.",
example:"Colombia, el único riesgo es que no quieras irte.",
words:["Colombia,","el","único","riesgo","es","que","no","quieras","irte."]},

{id:64,cat:"COPY",catN:"Copywriting",

{id:65,cat:"COPY",catN:"Copywriting",
tech:"Segundo párrafo de carta de ventas AIDA",
def:"Texto que despierta el interés del lector ampliando el problema planteado en el titular, en el modelo Atención-Interés-Deseo-Acción.",

/* ── CONT: Contenidos (15) ── */
{id:66,cat:"CONT",catN:"Contenidos",
tech:"Párrafo de contenido educativo atemporal (evergreen)",
def:"Texto que explica un concepto que seguirá siendo relevante años después de su publicación, sin referencias a fechas concretas.",
example:"El salario emocional se refiere al conjunto de beneficios no monetarios que una empresa ofrece a sus empleados, como la flexibilidad horaria, el teletrabajo y los programas de bienestar, para aumentar su satisfacción y compromiso.",
words:["El","salario","emocional","se","refiere","al","conjunto","de","beneficios","no","monetarios","que","una","empresa","ofrece","a","sus","empleados,","como","la","flexibilidad","horaria,","el","teletrabajo","y","los","programas","de","bienestar,","para","aumentar","su","satisfacción","y","compromiso."]},

{id:67,cat:"CONT",catN:"Contenidos",
tech:"Párrafo de tendencia con contexto local",
def:"Texto que contextualiza una tendencia global dentro de la realidad colombiana, aportando valor diferencial al lector local.",
example:"El fenómeno global de las dark kitchens o cocinas fantasma ha encontrado en Colombia un terreno fértil: Bogotá y Medellín concentran más de trescientas operaciones de este tipo que despachan exclusivamente por apps de domicilios.",
words:["El","fenómeno","global","de","las","dark","kitchens","o","cocinas","fantasma","ha","encontrado","en","Colombia","un","terreno","fértil:","Bogotá","y","Medellín","concentran","más","de","trescientas","operaciones","de","este","tipo","que","despachan","exclusivamente","por","apps","de","domicilios."]},

{id:68,cat:"CONT",catN:"Contenidos",
tech:"Párrafo explicativo con analogía",
def:"Texto que clarifica un concepto complejo comparándolo con algo cotidiano que el lector colombiano reconoce.",
example:"El blockchain funciona como una copia fiel de un libro de registro notarial que tienen miles de personas al mismo tiempo: si alguien intenta cambiar una transacción, las otras copias lo detectan y rechazan el cambio.",

{id:69,cat:"CONT",catN:"Contenidos",
tech:"Párrafo de datos de investigación propia",
def:"Texto que presenta los resultados de un estudio propio de la marca para generar autoridad y contenido único.",
example:"Según la encuesta de Semana a mil empresas colombianas, el cuarenta y ocho por ciento de las pymes que invirtieron en contenidos digitales en 2023 duplicaron su número de consultas orgánicas en menos de seis meses.",

{id:70,cat:"CONT",catN:"Contenidos",
tech:"Lead de contenido de redes sociales",
def:"Primera frase de una publicación en Instagram o LinkedIn diseñada para detener el scroll y generar engagement.",

words:["Le","pedí","a","diez","colombianos","que","trabajan","en","Silicon","Valley","que","describieran","en","una","palabra","qué","les","faltaba","de","Colombia.","La","respuesta","más","repetida","no","fue","la","comida."]},

{id:71,cat:"CONT",catN:"Contenidos",
tech:"Pie de foto descriptivo y narrativo",
def:"Texto de descripción de una imagen que agrega contexto, emoción o información adicional que la foto sola no transmite.",
example:"El mercado de Paloquemao al amanecer, cuando los agricultores de Cundinamarca y Boyacá llegan con sus cosechas antes de que despierte el resto de Bogotá. Una tradición de más de cincuenta años.",
words:["El","mercado","de","Paloquemao","al","amanecer,","cuando","los","agricultores","de","Cundinamarca","y","Boyacá","llegan","con","sus","cosechas","antes","de","que","despierte","el","resto","de","Bogotá.","Una","tradición","de","más","de","cincuenta","años."]},

{id:72,cat:"CONT",catN:"Contenidos",
tech:"Párrafo de contenido generador de debate",
def:"Texto que presenta una posición controversial o una pregunta abierta para estimular comentarios y compartidos.",
example:"Colombia gasta más en infraestructura vial cada año, pero el tiempo de desplazamiento en sus principales ciudades sigue aumentando. ¿Están bien invertidos esos recursos o el problema es otro?",

{id:73,cat:"CONT",catN:"Contenidos",
tech:"Párrafo de contenido de temporada",
def:"Texto que aprovecha un evento, festividad o temporada del calendario colombiano para aumentar la relevancia del contenido.",
example:"Esta Semana Santa, si planeas viajar por las vías nacionales de Colombia, el INVIAS activó operación especial con más de tres mil kilómetros bajo monitoreo continuo y corredores de movilidad alternos activos.",
words:["Esta","Semana","Santa,","si","planeas","viajar","por","las","vías","nacionales","de","Colombia,","el","INVIAS","activó","operación","especial","con","más","de","tres","mil","kilómetros","bajo","monitoreo","continuo","y","corredores","de","movilidad","alternos","activos."]},

{id:74,cat:"CONT",catN:"Contenidos",
tech:"Párrafo de contenido aspiracional",
def:"Texto que conecta el producto o servicio con el estilo de vida al que aspira el usuario colombiano.",
example:"Imagina revisar tus inversiones en la bolsa de valores desde una finca en el Eje Cafetero mientras desayunas bandeja paisa. Con la plataforma Tyba, ese es el tipo de libertad financiera que más de doscientos mil colombianos ya tienen.",
words:["Imagina","revisar","tus","inversiones","en","la","bolsa","de","valores","desde","una","finca","en","el","Eje","Cafetero","mientras","desayunas","bandeja","paisa.","Con","la","plataforma","Tyba,","ese","es","el","tipo","de","libertad","financiera","que","más","de","doscientos","mil","colombianos","ya","tienen."]},

{id:75,cat:"CONT",catN:"Contenidos",
tech:"Párrafo de contenido paso a paso",
def:"Texto instructivo que divide un proceso en acciones simples y secuenciales, escritas en segunda persona.",
example:"Para renovar tu pasaporte colombiano desde el exterior, primero agenda tu cita en el consulado más cercano, luego reúne el pasaporte vencido y el comprobante de pago de la tasa consular y finalmente preséntate con puntualidad en la fecha asignada.",
words:["Para","renovar","tu","pasaporte","colombiano","desde","el","exterior,","primero","agenda","tu","cita","en","el","consulado","más","cercano,","luego","reúne","el","pasaporte","vencido","y","el","comprobante","de","pago","de","la","tasa","consular","y","finalmente","preséntate","con","puntualidad","en","la","fecha","asignada."]},

{id:76,cat:"CONT",catN:"Contenidos",
tech:"Párrafo de narración de caso de éxito",

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let mode='flash',filter='all',search='',idx=0,flipped=false;
let completed=JSON.parse(localStorage.getItem('rw_done')||'[]');
let exSt=JSON.parse(localStorage.getItem('rw_ex')||'{}');
let dragChip=null,dragFrom=null,lcDrag=null;

function save(){
  localStorage.setItem('rw_done',JSON.stringify(completed));
  localStorage.setItem('rw_ex',JSON.stringify(exSt));
}

/* ── FILTER ── */
function getFiltered(){
  let c=CARDS;
  if(filter!=='all') c=c.filter(x=>x.cat===filter);
  if(search){const q=search.toLowerCase();c=c.filter(x=>x.tech.toLowerCase().includes(q)||x.catN.toLowerCase().includes(q)||x.def.toLowerCase().includes(q));}
  return c;
}

/* ── PROGRESS ── */
function updProg(){
  const d=completed.length;
  document.getElementById('pc').textContent=d;
  document.getElementById('pf').style.width=d+'%';
  document.getElementById('sd').textContent=d;
  document.getElementById('sp').textContent=100-d;
}
function updFilter(){
  const f=getFiltered();
  const lbl=filter==='all'?'todas':filter;
  document.getElementById('sf').textContent=lbl+' ('+f.length+')';
}

/* ── MODE ── */
function setMode(m){
  mode=m;
  document.getElementById('mflash').style.display=m==='flash'?'block':'none';
  document.getElementById('mlist').style.display=m==='list'?'block':'none';
  document.getElementById('t-flash').classList.toggle('on',m==='flash');
  document.getElementById('t-list').classList.toggle('on',m==='list');
  if(m==='flash') renderCard(); else renderList();
}

/* ── FILTER / SEARCH ── */
function setFilter(f,btn){
  filter=f; idx=0;
  document.querySelectorAll('.ftag').forEach(b=>{
    b.classList.remove('on');
    ['t-vivid','t-leaf','t-ocean','t-orchid','t-sun','t-estr'].forEach(c=>b.classList.remove(c));
  });
  btn.classList.add('on');
  const map={WEB:'t-vivid',SEO:'t-leaf',UX:'t-ocean',COPY:'t-orchid',CONT:'t-sun',ESTR:'t-estr'};
  if(map[f]) btn.classList.add(map[f]);
  updFilter();
  if(mode==='flash'){resetFlip();renderCard();}else renderList();
}
function doSearch(v){search=v;idx=0;updFilter();if(mode==='flash'){resetFlip();renderCard();}else renderList();}

/* ══════════════════════
   FLASHCARD
══════════════════════ */
function resetFlip(){flipped=false;document.getElementById('FC').classList.remove('flipped');}

function flipCard(e){
  if(e.target.closest('.exarea')||e.target.closest('.xbtn')||e.target.closest('.chip')) return;
  flipped=!flipped;
  document.getElementById('FC').classList.toggle('flipped',flipped);
}

function renderCard(){
  const fi=getFiltered();
  if(!fi.length){
    document.getElementById('fcc').textContent='000 / 000';
    document.getElementById('cftc').textContent='Sin resultados';
    document.getElementById('cfdf').textContent='';
    document.getElementById('cft').innerHTML='';
    return;
  }
  if(idx>=fi.length) idx=fi.length-1;
  const card=fi[idx];
  const done=completed.includes(card.id);

  document.getElementById('fcc').textContent=pad(idx+1)+' / '+pad(fi.length);
  const num=pad(card.id);
  document.getElementById('cfn').textContent=num;
  document.getElementById('cbn').textContent=num;

  const tagHTML=`<div class="tdot td-${card.cat}"></div><span class="tc-${card.cat}">${card.catN.toUpperCase()}</span>`;
  document.getElementById('cft').innerHTML=tagHTML;
  document.getElementById('cbt').innerHTML=tagHTML;
  document.getElementById('cftc').textContent=card.tech;
  document.getElementById('cfdf').textContent=card.def;
  document.getElementById('ceq').textContent=card.example;

  const bm=document.getElementById('bmark');
  bm.className='nbtn mark'+(done?' done':'');
  bm.innerHTML=done?'<i class="bi bi-check2-circle"></i> Completada':'<i class="bi bi-check2"></i> Marcar';

  document.getElementById('bprev').disabled=idx===0;
  document.getElementById('bnext').disabled=idx===fi.length-1;

  renderCardEx(card);
  updProg();
}
function pad(n){return String(n).padStart(3,'0');}

function renderCardEx(card){
  const key=String(card.id);
  const sv=exSt[key];
  const drop=document.getElementById('cdrop');
  const bank=document.getElementById('cbank');
  const fb=document.getElementById('cfb');
  drop.innerHTML=''; bank.innerHTML=''; fb.textContent=''; fb.className='exfb';

  const dropped=sv?sv.dropped:[];
  const bankW=sv?sv.bank:shuffle([...card.words]);

  bankW.forEach(w=>bank.appendChild(mkChip(w,'cbank','cdrop',false)));
  dropped.forEach(w=>drop.appendChild(mkChip(w,'cdrop','cbank',true)));

  if(sv&&sv.fb){fb.textContent=sv.fb;fb.className='exfb '+(sv.ok?'ok':'err');}
}

function mkChip(word,home,other,inDrop){
  const ch=document.createElement('div');
  ch.className='chip'+(inDrop?' indrop':'');
  ch.textContent=word; ch.draggable=true;
  ch.dataset.word=word; ch.dataset.home=home; ch.dataset.other=other;

  ch.addEventListener('dragstart',e=>{dragChip=ch;dragFrom=home;e.dataTransfer.effectAllowed='move';});
  ch.addEventListener('dragend',()=>{dragChip=null;});
  ch.addEventListener('click',()=>{
    const dst=document.getElementById(other);
    if(!dst) return;
    dst.appendChild(ch);
    const nowDrop=other==='cdrop';
    ch.className='chip'+(nowDrop?' indrop':'');
    ch.dataset.home=other; ch.dataset.other=home;
    saveCardEx();
  });
  return ch;
}

function dO(e){e.preventDefault();e.currentTarget.classList.add('over');}
function dL(e){e.currentTarget.classList.remove('over');}
function dDrop(e,zid){
  e.preventDefault();e.currentTarget.classList.remove('over');
  if(!dragChip) return;
  const zone=document.getElementById(zid);
  if(!zone) return;
  zone.appendChild(dragChip);
  const inDrop=zid==='cdrop';
  dragChip.className='chip'+(inDrop?' indrop':'');
  dragChip.dataset.home=zid; dragChip.dataset.other=dragFrom;
  saveCardEx();
}

function saveCardEx(fb,ok){
  const fi=getFiltered(); if(!fi.length) return;
  const card=fi[idx];
  const key=String(card.id);
  const d=document.getElementById('cdrop');
  const b=document.getElementById('cbank');
  if(!d||!b) return;
  exSt[key]={dropped:[...d.children].map(c=>c.dataset.word),bank:[...b.children].map(c=>c.dataset.word),fb:fb||'',ok:ok||false};
  save();
}

function chkCard(e){
  e.stopPropagation();
  const fi=getFiltered(); if(!fi.length) return;
  const card=fi[idx];
  const drop=document.getElementById('cdrop');
  const fb=document.getElementById('cfb');
  const dropped=[...drop.children].map(c=>c.dataset.word);
  const isOk=JSON.stringify(dropped)===JSON.stringify(card.words);
  fb.textContent=isOk?'✓ ¡Perfecto! Orden correcto.':'✗ No es el orden correcto. Inténtalo de nuevo.';
  fb.className='exfb '+(isOk?'ok':'err');
  if(isOk&&!completed.includes(card.id)){completed.push(card.id);save();updProg();renderCard();return;}
  saveCardEx(fb.textContent,isOk);
}

function rstCard(e){
  e.stopPropagation();
  const fi=getFiltered(); if(!fi.length) return;
  const card=fi[idx];
  delete exSt[String(card.id)]; save(); renderCardEx(card);
}

function nav(d){
  const fi=getFiltered();
  idx=Math.max(0,Math.min(fi.length-1,idx+d));
  resetFlip(); renderCard();
}

function toggleMark(){
  const fi=getFiltered(); if(!fi.length) return;
  const card=fi[idx];
  if(completed.includes(card.id)) completed=completed.filter(i=>i!==card.id);
  else completed.push(card.id);
  save(); updProg(); renderCard();
}

/* ══════════════════════
   LIST MODE
══════════════════════ */
function renderList(){
  const fi=getFiltered();
  const grid=document.getElementById('lgrid');
  const empty=document.getElementById('empt');
  grid.innerHTML='';
  if(!fi.length){empty.style.display='block';return;}
  empty.style.display='none';

  fi.forEach(card=>{
    const done=completed.includes(card.id);
    const key=String(card.id);
    const sv=exSt[key];
    const bankW=sv?sv.bank:shuffle([...card.words]);
    const dropped=sv?sv.dropped:[];

    const el=document.createElement('div');
    el.className='lcard'+(done?' done':'');

    const dropHTML=dropped.map(w=>`<div class="lchip indrop" draggable="true" data-word="${w}"
      ondragstart="lcDS(event,'ld${card.id}')" ondragend="lcDE()"
      onclick="lcClick(event,this,'ld${card.id}','lb${card.id}',${card.id})">${w}</div>`).join('');
    const bankHTML=bankW.map(w=>`<div class="lchip" draggable="true" data-word="${w}"
      ondragstart="lcDS(event,'lb${card.id}')" ondragend="lcDE()"
      onclick="lcClick(event,this,'lb${card.id}','ld${card.id}',${card.id})">${w}</div>`).join('');
    const fbHTML=sv&&sv.fb?`<div class="lcfb ${sv.ok?'ok':'err'}">${sv.fb}</div>`:`<div class="lcfb"></div>`;

    el.innerHTML=`
    <div class="lc-hdr">
      <span class="lc-num">#${pad(card.id)}</span>
      <span class="lc-badge lb-${card.cat}">${card.catN}</span>
      ${done?'<span class="done-pill">✓ Hecho</span>':''}
    </div>
    <div class="lc-body">
      <div class="lc-tech">${card.tech}</div>
      <div class="lc-def">${card.def}</div>
      <div class="lc-ex">${card.example}</div>
      <div class="lc-xzone">
        <div class="lc-xhdr"><i class="bi bi-puzzle-fill"></i> RECONSTRUYE LA ORACIÓN</div>
        <div class="lc-drop" id="ld${card.id}"
          ondragover="lcDO(event)" ondrop="lcDrop(event,'ld${card.id}','lb${card.id}',${card.id})"
          ondragleave="lcDL(event)">${dropHTML}</div>
        <div class="lc-bank" id="lb${card.id}">${bankHTML}</div>
        <div class="lc-acts">
          <button class="lxbtn chk" onclick="lcChk(${card.id})">Verificar</button>
          <button class="lxbtn rst" onclick="lcRst(${card.id})">Reiniciar</button>
        </div>
        ${fbHTML}
      </div>
    </div>`;
    grid.appendChild(el);
  });
  updProg();
}

function lcDS(e,src){lcDrag=e.currentTarget;lcDrag._src=src;e.dataTransfer.effectAllowed='move';}
function lcDE(){lcDrag=null;}
function lcDO(e){e.preventDefault();e.currentTarget.classList.add('over');}
function lcDL(e){e.currentTarget.classList.remove('over');}
function lcDrop(e,dropId,bankId,cid){
  e.preventDefault();e.currentTarget.classList.remove('over');
  if(!lcDrag) return;
  document.getElementById(dropId).appendChild(lcDrag);
  lcDrag.className='lchip indrop';
  lcSaveSt(cid,dropId,bankId);
}
function lcClick(e,chip,src,dst,cid){
  const dstEl=document.getElementById(dst);
  if(!dstEl) return;
  dstEl.appendChild(chip);
  const nowDrop=dst.startsWith('ld');
  chip.className='lchip'+(nowDrop?' indrop':'');
  chip.setAttribute('ondragstart',`lcDS(event,'${dst}')`);
  chip.setAttribute('onclick',`lcClick(event,this,'${dst}','${src}',${cid})`);
  lcSaveSt(cid,nowDrop?dst:'ld'+cid,nowDrop?src:'lb'+cid);
}
function lcSaveSt(cid,dropId,bankId,fb,ok){
  const d=document.getElementById(dropId);
  const b=document.getElementById(bankId);
  if(!d||!b) return;
  exSt[String(cid)]={dropped:[...d.children].map(c=>c.dataset.word),bank:[...b.children].map(c=>c.dataset.word),fb:fb||'',ok:ok||false};
  save();
}
function lcChk(cid){
  const card=CARDS.find(c=>c.id===cid);
  const drop=document.getElementById('ld'+cid);
  const fbEl=drop.closest('.lc-xzone').querySelector('.lcfb');
  const dropped=[...drop.children].map(c=>c.dataset.word);
  const isOk=JSON.stringify(dropped)===JSON.stringify(card.words);
  fbEl.textContent=isOk?'✓ ¡Correcto!':'✗ Orden incorrecto.';
  fbEl.className='lcfb '+(isOk?'ok':'err');
  if(isOk&&!completed.includes(cid)){completed.push(cid);save();updProg();renderList();return;}
  lcSaveSt(cid,'ld'+cid,'lb'+cid,fbEl.textContent,isOk);
}
function lcRst(cid){delete exSt[String(cid)];save();renderList();}

/* ── UTILS ── */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function resetAll(){
  if(!confirm('¿Reiniciar todo el progreso?')) return;
  completed=[];exSt={};
  localStorage.removeItem('rw_done');localStorage.removeItem('rw_ex');
  idx=0;resetFlip();updProg();updFilter();
  if(mode==='flash') renderCard(); else renderList();
}

/* ── INIT ── */
document.addEventListener('DOMContentLoaded',()=>{updProg();updFilter();renderCard();});
</script>
</body>
</html>
