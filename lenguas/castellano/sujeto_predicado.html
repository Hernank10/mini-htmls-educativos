<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sujeto y Predicado - Mini Lección</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .ejemplo { background: #e3f2fd; padding: 10px; border-left: 4px solid #2196F3; margin: 10px 0; }
        button { background: #2196F3; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .respuesta { display: none; background: #d4edda; padding: 10px; border-radius: 5px; margin-top: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>📖 Sujeto y Predicado</h1>
    <div class="card">
        <h2>Sujeto</h2>
        <p>Es quien realiza la acción.</p>
        <div class="ejemplo">"El perro ladra" → Sujeto: El perro</div>
    </div>
    <div class="card">
        <h2>Predicado</h2>
        <p>Es la acción que realiza el sujeto.</p>
        <div class="ejemplo">"El perro ladra" → Predicado: ladra</div>
    </div>
    <div class="card">
        <h2>Ejercicio</h2>
        <p><strong>"María estudia en la biblioteca"</strong></p>
        <button onclick="mostrar()">Ver respuesta</button>
        <div id="respuesta" class="respuesta">Sujeto: María<br>Predicado: estudia en la biblioteca</div>
    </div>
    <script>
        function mostrar() {
            document.getElementById('respuesta').style.display = 'block';
        }
    </script>
    <p><a href="../../index.html">← Volver al inicio</a></p>
</body>
</html>
