<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · Redacción Científica | Arq & Ciencias Colombia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Space+Mono:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0c;
    --cream: #f5f0e8;
    --accent: #c8392b;
    --gold: #d4a843;
    --steel: #2c3e50;
    --mist: #e8e2d8;
    --green-done: #27ae60;
    --card-w: 720px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Lato', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--ink);
    color: var(--cream);
    padding: 0;
    border-bottom: 4px solid var(--accent);
  }
  .site-header .inner {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    gap: 16px; flex-wrap: wrap;
  }
  .site-logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    font-weight: 900; letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .site-logo span { color: var(--gold); }

  .progress-bar-wrap { flex: 1; min-width: 180px; max-width: 300px; }
  .progress-label { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--mist); margin-bottom: 4px; }
  .prog-bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width .5s ease; }

  /* ── NAV TABS ── */
  .mode-tabs { background: var(--steel); }
  .mode-tabs .inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 0; }
  .mode-tab {
    padding: 12px 28px; cursor: pointer; font-family: 'Space Mono', monospace;
    font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    color: #aaa; border: none; background: transparent;
    border-bottom: 3px solid transparent; transition: all .2s;
  }
  .mode-tab:hover { color: var(--cream); }
  .mode-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── MAIN LAYOUT ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 32px 16px; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
    align-items: center;
  }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--ink);
    background: transparent; font-family: 'Space Mono', monospace; font-size: 11px;
    cursor: pointer; transition: all .2s; letter-spacing: .5px;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--ink); color: var(--cream);
  }
  .filter-btn.mat { border-color: #2980b9; }
  .filter-btn.mat.active, .filter-btn.mat:hover { background: #2980b9; color: #fff; }
  .filter-btn.fis { border-color: #8e44ad; }
  .filter-btn.fis.active, .filter-btn.fis:hover { background: #8e44ad; color: #fff; }
  .filter-btn.qui { border-color: #16a085; }
  .filter-btn.qui.active, .filter-btn.qui:hover { background: #16a085; color: #fff; }
  .filter-btn.arq { border-color: var(--accent); }
  .filter-btn.arq.active, .filter-btn.arq:hover { background: var(--accent); color: #fff; }

  .search-input {
    padding: 7px 16px; border: 1.5px solid var(--ink); border-radius: 20px;
    font-family: 'Lato', sans-serif; font-size: 13px; background: transparent;
    outline: none; width: 200px;
  }
  .search-input:focus { border-color: var(--gold); }

  /* ── FLASHCARD MODE ── */
  #mode-flash { display: block; }
  #mode-list  { display: none; }

  .flash-stage {
    display: flex; flex-direction: column; align-items: center;
    gap: 20px;
  }

  .flash-counter {
    font-family: 'Space Mono', monospace; font-size: 13px; color: #666;
    letter-spacing: 2px;
  }

  .flashcard {
    width: 100%; max-width: var(--card-w);
    perspective: 1200px;
    cursor: pointer;
  }
  .card-inner {
    position: relative; width: 100%; min-height: 340px;
    transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,0,.2,1);
    border-radius: 4px;
  }
  .flashcard.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 4px; padding: 36px 40px;
    display: flex; flex-direction: column; justify-content: center;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .card-front {
    background: var(--cream);
    border: 2px solid var(--ink);
  }
  .card-back {
    background: var(--ink);
    color: var(--cream);
    transform: rotateY(180deg);
    border: 2px solid var(--ink);
  }

  .card-discipline {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .disc-mat { color: #2980b9; }
  .disc-fis { color: #8e44ad; }
  .disc-qui { color: #16a085; }
  .disc-arq { color: var(--accent); }

  .card-back .card-discipline { opacity: .6; }

  .card-num {
    position: absolute; top: 16px; right: 20px;
    font-family: 'Space Mono', monospace; font-size: 11px; opacity: .4;
  }

  .card-technique {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 3vw, 1.35rem);
    font-weight: 700; margin-bottom: 10px;
    line-height: 1.25;
  }

  .card-def {
    font-size: 14px; line-height: 1.65; color: #444;
  }
  .card-back .card-def { color: #ccc; font-size: 13px; }

  .flip-hint {
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: #999; text-align: center; letter-spacing: 1px;
    margin-top: 18px;
  }

  .card-example-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 8px;
  }
  .card-example-text {
    font-family: 'Lato', sans-serif; font-size: 14px;
    font-style: italic; line-height: 1.6;
    border-left: 3px solid var(--gold); padding-left: 14px;
    color: #e8e0d0;
  }

  /* ── DRAG EXERCISE IN CARD ── */
  .exercise-area {
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,.15);
  }
  .ex-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }

  .drop-zone {
    display: flex; flex-wrap: wrap; gap: 6px; min-height: 44px;
    border: 2px dashed rgba(255,255,255,.2); border-radius: 4px;
    padding: 8px; margin-bottom: 10px;
    transition: border-color .2s;
  }
  .drop-zone.drag-over { border-color: var(--gold); }

  .word-bank {
    display: flex; flex-wrap: wrap; gap: 6px; min-height: 36px;
    margin-bottom: 10px;
  }

  .word-chip {
    padding: 5px 12px; border-radius: 3px; cursor: grab;
    font-size: 13px; line-height: 1.3;
    user-select: none; transition: all .15s;
    border: 1.5px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.08); color: #e8e0d0;
  }
  .word-chip:active { cursor: grabbing; opacity: .7; }
  .word-chip.placed { opacity: .4; cursor: default; }
  .word-chip.in-drop {
    background: rgba(212,168,67,.15); border-color: var(--gold);
    cursor: grab;
  }

  .ex-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .ex-btn {
    padding: 5px 14px; border-radius: 3px; border: 1.5px solid;
    font-family: 'Space Mono', monospace; font-size: 11px;
    cursor: pointer; transition: all .2s; letter-spacing: .5px;
  }
  .ex-btn.check { border-color: var(--gold); color: var(--gold); background: transparent; }
  .ex-btn.check:hover { background: var(--gold); color: var(--ink); }
  .ex-btn.reset { border-color: #666; color: #999; background: transparent; }
  .ex-btn.reset:hover { border-color: #aaa; color: #ccc; }

  .ex-feedback {
    font-family: 'Space Mono', monospace; font-size: 11px;
    margin-top: 6px; min-height: 18px;
    letter-spacing: .5px;
  }
  .ex-feedback.correct { color: #2ecc71; }
  .ex-feedback.wrong   { color: var(--accent); }

  /* ── FLASH NAV ── */
  .flash-nav {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    justify-content: center;
  }
  .nav-btn {
    padding: 10px 24px; border: 2px solid var(--ink);
    background: transparent; font-family: 'Space Mono', monospace;
    font-size: 12px; cursor: pointer; border-radius: 3px;
    transition: all .2s; letter-spacing: .5px;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-btn:hover { background: var(--ink); color: var(--cream); }
  .nav-btn.done-btn { border-color: var(--green-done); color: var(--green-done); }
  .nav-btn.done-btn:hover { background: var(--green-done); color: #fff; }
  .nav-btn.done-btn.marked { background: var(--green-done); color: #fff; }
  .nav-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* ── LIST MODE ── */
  .list-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .list-card {
    background: #fff; border: 2px solid var(--ink);
    border-radius: 4px; overflow: hidden;
    box-shadow: 4px 4px 0 var(--mist);
    transition: box-shadow .2s, transform .2s;
  }
  .list-card:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--mist); }
  .list-card.completed { border-color: var(--green-done); }
  .list-card.completed .lc-header { background: var(--green-done); }

  .lc-header {
    background: var(--ink); color: var(--cream);
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  }
  .lc-num { font-family: 'Space Mono', monospace; font-size: 10px; opacity: .5; }
  .lc-disc {
    font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; padding: 2px 8px; border-radius: 10px;
  }
  .lc-disc.mat { background: #2980b9; }
  .lc-disc.fis { background: #8e44ad; }
  .lc-disc.qui { background: #16a085; }
  .lc-disc.arq { background: var(--accent); }

  .lc-body { padding: 16px; }
  .lc-technique {
    font-family: 'Playfair Display', serif; font-size: 1rem;
    font-weight: 700; margin-bottom: 6px;
  }
  .lc-def { font-size: 12px; color: #555; line-height: 1.55; margin-bottom: 10px; }
  .lc-example { font-size: 12px; font-style: italic; color: #333;
    border-left: 3px solid var(--gold); padding-left: 10px; margin-bottom: 12px; }

  .lc-exercise { background: #f9f6f0; border-radius: 4px; padding: 12px; }
  .lc-ex-label {
    font-family: 'Space Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
  }

  .lc-drop-zone {
    display: flex; flex-wrap: wrap; gap: 5px; min-height: 36px;
    border: 2px dashed #ccc; border-radius: 3px; padding: 6px; margin-bottom: 8px;
    transition: border-color .2s;
  }
  .lc-drop-zone.drag-over { border-color: var(--gold); }

  .lc-word-bank { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }

  .lc-chip {
    padding: 4px 10px; border-radius: 3px; cursor: grab; font-size: 12px;
    user-select: none; border: 1.5px solid #bbb; background: #fff;
    transition: all .15s; color: var(--ink);
  }
  .lc-chip:active { cursor: grabbing; opacity: .7; }
  .lc-chip.placed { opacity: .35; cursor: default; }
  .lc-chip.in-drop { background: #fef9e7; border-color: var(--gold); cursor: grab; }

  .lc-actions { display: flex; gap: 6px; }
  .lc-btn {
    padding: 4px 12px; border-radius: 3px; border: 1.5px solid;
    font-family: 'Space Mono', monospace; font-size: 10px; cursor: pointer; transition: all .2s;
  }
  .lc-btn.check { border-color: var(--steel); color: var(--steel); background: transparent; }
  .lc-btn.check:hover { background: var(--steel); color: #fff; }
  .lc-btn.reset { border-color: #ccc; color: #999; background: transparent; }
  .lc-btn.reset:hover { border-color: #999; color: #555; }
  .lc-feedback { font-family: 'Space Mono', monospace; font-size: 10px; margin-top: 5px; min-height: 16px; }
  .lc-feedback.correct { color: var(--green-done); }
  .lc-feedback.wrong { color: var(--accent); }

  /* ── DONE BADGE ── */
  .done-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'Space Mono', monospace; font-size: 9px;
    background: var(--green-done); color: #fff; border-radius: 10px;
    padding: 2px 8px; letter-spacing: 1px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .card-face { padding: 24px 20px; }
    .card-technique { font-size: 1rem; }
    .mode-tab { padding: 10px 14px; font-size: 10px; }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .flash-stage, .list-card { animation: fadeUp .35s ease both; }
  .list-card:nth-child(2) { animation-delay: .04s; }
  .list-card:nth-child(3) { animation-delay: .08s; }
  .list-card:nth-child(4) { animation-delay: .12s; }
  .list-card:nth-child(5) { animation-delay: .16s; }

  .stats-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 20px; font-family: 'Space Mono', monospace; font-size: 12px;
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; }
  .stat-dot.done { background: var(--green-done); }
  .stat-dot.pending { background: #ccc; }

  .empty-msg { text-align: center; padding: 60px 20px; opacity: .4;
    font-family: 'Space Mono', monospace; font-size: 13px; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="inner">
    <div class="site-logo">
      Redacción<br><span>Científica</span><br>
      <small style="font-size:.55em;font-weight:400;opacity:.6;font-family:'Space Mono',monospace">MAT · FÍS · QUI · ARQ · Colombia</small>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label"><span id="prog-count">0</span> / 100 completadas</div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>
</header>

<!-- MODE TABS -->
<nav class="mode-tabs">
  <div class="inner">
    <button class="mode-tab active" onclick="setMode('flash')" id="tab-flash">
      <i class="bi bi-card-heading"></i> Flashcards
    </button>
    <button class="mode-tab" onclick="setMode('list')" id="tab-list">
      <i class="bi bi-grid-3x3-gap"></i> Lista / Técnicas
    </button>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-btn mat" onclick="setFilter('Matemáticas',this)">Matemáticas</button>
    <button class="filter-btn fis" onclick="setFilter('Física',this)">Física</button>
    <button class="filter-btn qui" onclick="setFilter('Química',this)">Química</button>
    <button class="filter-btn arq" onclick="setFilter('Arquitectura',this)">Arquitectura</button>
    <input class="search-input" id="search-input" type="text" placeholder="🔍 Buscar técnica…" oninput="doSearch(this.value)">
    <button class="filter-btn" onclick="resetAll()" style="margin-left:auto;border-color:var(--accent);color:var(--accent)">
      <i class="bi bi-arrow-counterclockwise"></i> Reiniciar
    </button>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat"><div class="stat-dot done"></div><span id="stat-done">0 completadas</span></div>
    <div class="stat"><div class="stat-dot pending"></div><span id="stat-pending">100 pendientes</span></div>
    <div class="stat"><span id="stat-filter">Mostrando: todas</span></div>
  </div>

  <!-- FLASHCARD MODE -->
  <div id="mode-flash">
    <div class="flash-stage">
      <div class="flash-counter" id="flash-counter">1 / 100</div>

      <div class="flashcard" id="flashcard" onclick="flipCard(event)">
        <div class="card-inner" id="card-inner">
          <!-- FRONT -->
          <div class="card-face card-front" id="cf">
            <div class="card-num" id="cf-num">01</div>
            <div class="card-discipline" id="cf-disc"></div>
            <div class="card-technique" id="cf-tech"></div>
            <div class="card-def" id="cf-def"></div>
            <div class="flip-hint">↩ Toca para ver ejemplo y ejercicio</div>
          </div>
          <!-- BACK -->
          <div class="card-face card-back" id="cb">
            <div class="card-num" id="cb-num">01</div>
            <div class="card-discipline" id="cb-disc"></div>
            <div class="card-example-label">Ejemplo</div>
            <div class="card-example-text" id="cb-ex"></div>
            <div class="exercise-area">
              <div class="ex-label"><i class="bi bi-puzzle"></i> Ordenar palabras</div>
              <div class="drop-zone" id="card-drop" ondragover="onDragOver(event)" ondrop="onDrop(event,'card-drop')" ondragleave="onDragLeave(event)"></div>
              <div class="word-bank" id="card-bank"></div>
              <div class="ex-actions">
                <button class="ex-btn check" onclick="checkCard(event)">Verificar</button>
                <button class="ex-btn reset" onclick="resetCardExercise(event)">Reiniciar</button>
              </div>
              <div class="ex-feedback" id="card-feedback"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="flash-nav">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)"><i class="bi bi-arrow-left"></i> Anterior</button>
        <button class="nav-btn done-btn" id="btn-mark" onclick="markDone()"><i class="bi bi-check2"></i> Marcar</button>
        <button class="nav-btn" id="btn-next" onclick="navigate(1)">Siguiente <i class="bi bi-arrow-right"></i></button>
      </div>
    </div>
  </div>

  <!-- LIST MODE -->
  <div id="mode-list">
    <div class="list-grid" id="list-grid"></div>
    <div class="empty-msg" id="empty-msg" style="display:none">No hay tarjetas con ese filtro.</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ═══════════════════════════════════════════════
// DATA — 100 FLASHCARDS
// ═══════════════════════════════════════════════
const CARDS = [
// ── MATEMÁTICAS (25) ──
{id:1,disc:"Matemáticas",tech:"Definición Formal",
def:"Enunciado preciso que establece las condiciones necesarias y suficientes de un concepto matemático.",
example:"Un número primo es aquel entero mayor que uno que únicamente admite como divisores a la unidad y a sí mismo.",
words:["Un","número","primo","es","aquel","entero","mayor","que","uno","que","únicamente","admite","como","divisores","a","la","unidad","y","a","sí","mismo."]},

{id:2,disc:"Matemáticas",tech:"Demostración por Contraejemplo",
def:"Estrategia que refuta una afirmación universal presentando un caso específico que la viola.",
example:"La conjetura de que todo número impar es primo queda refutada al considerar el número nueve, producto de tres por tres.",
words:["La","conjetura","de","que","todo","número","impar","es","primo","queda","refutada","al","considerar","el","número","nueve,","producto","de","tres","por","tres."]},

{id:3,disc:"Matemáticas",tech:"Inducción Matemática",

words:["Se","demuestra","que","la","suma","de","los","primeros","n","números","naturales","es","igual","a","n","multiplicado","por","n","más","uno","sobre","dos."]},

{id:4,disc:"Matemáticas",tech:"Notación Científica",
def:"Expresión de cantidades muy grandes o muy pequeñas como producto de un número entre 1 y 10 por una potencia de diez.",
example:"La distancia entre Bogotá y Medellín, aproximadamente cuatrocientos kilómetros, equivale a cuatro por diez elevado a la quinta en metros.",

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let currentMode = 'flash';
let currentFilter = 'all';
let currentSearch = '';
let currentIndex = 0;
let isFlipped = false;

// Load completed from localStorage
let completed = JSON.parse(localStorage.getItem('rc_completed') || '[]');
// Exercise state per card: { dropped: [], bankState: [] }
let exerciseStates = JSON.parse(localStorage.getItem('rc_exercises') || '{}');

// dragging state
let draggedChip = null;
let draggedFrom = null; // 'bank' or 'drop'
let dragContext = null; // { dropId, bankId }

function saveCompleted() {
  localStorage.setItem('rc_completed', JSON.stringify(completed));
}
function saveExercises() {
  localStorage.setItem('rc_exercises', JSON.stringify(exerciseStates));
}

// ── FILTER ──
function getFiltered() {
  let cards = CARDS;
  if (currentFilter !== 'all') cards = cards.filter(c => c.disc === currentFilter);
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    cards = cards.filter(c =>
      c.tech.toLowerCase().includes(q) ||
      c.disc.toLowerCase().includes(q) ||
      c.def.toLowerCase().includes(q)
    );
  }
  return cards;
}

function discClass(disc) {
  const m = { 'Matemáticas':'mat','Física':'fis','Química':'qui','Arquitectura':'arq' };
  return m[disc] || 'mat';
}

// ═══════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════
function updateProgress() {
  const done = completed.length;
  const pct = Math.round(done / 100 * 100);
  document.getElementById('prog-count').textContent = done;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('stat-done').textContent = done + ' completadas';
  document.getElementById('stat-pending').textContent = (100 - done) + ' pendientes';
}

function updateStatFilter() {
  const f = getFiltered();
  const label = currentFilter === 'all' ? 'todas' : currentFilter;
  document.getElementById('stat-filter').textContent =
    'Mostrando: ' + label + ' (' + f.length + ')';
}

// ═══════════════════════════════════════════════
// MODE
// ═══════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-flash').style.display = mode === 'flash' ? 'block' : 'none';
  document.getElementById('mode-list').style.display  = mode === 'list'  ? 'block' : 'none';
  document.getElementById('tab-flash').classList.toggle('active', mode === 'flash');
  document.getElementById('tab-list').classList.toggle('active', mode === 'list');
  if (mode === 'flash') renderCard();
  else renderList();
}

// ═══════════════════════════════════════════════
// FILTER & SEARCH
// ═══════════════════════════════════════════════
function setFilter(f, btn) {
  currentFilter = f;
  currentIndex = 0;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    ['mat','fis','qui','arq'].forEach(c => b.classList.remove(c));
  });
  btn.classList.add('active');
  const dc = discClass(f);
  if (f !== 'all') btn.classList.add(dc);
  updateStatFilter();
  if (currentMode === 'flash') { resetFlip(); renderCard(); }
  else renderList();
}

function doSearch(val) {
  currentSearch = val;
  currentIndex = 0;
  updateStatFilter();
  if (currentMode === 'flash') { resetFlip(); renderCard(); }
  else renderList();
}

// ═══════════════════════════════════════════════
// FLASHCARD MODE
// ═══════════════════════════════════════════════
function resetFlip() {
  isFlipped = false;
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped');
}

function flipCard(e) {
  if (e.target.closest('.exercise-area') || e.target.closest('.ex-btn') || e.target.closest('.word-chip')) return;
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
}

function renderCard() {
  const filtered = getFiltered();
  if (!filtered.length) {
    document.getElementById('flash-counter').textContent = '0 / 0';
    document.getElementById('cf-tech').textContent = 'Sin resultados';
    document.getElementById('cf-def').textContent = '';
    document.getElementById('cf-disc').textContent = '';
    return;
  }
  if (currentIndex >= filtered.length) currentIndex = filtered.length - 1;

  const card = filtered[currentIndex];
  const total = filtered.length;
  const isDone = completed.includes(card.id);

  document.getElementById('flash-counter').textContent = (currentIndex + 1) + ' / ' + total;

  const cfNum = document.getElementById('cf-num');
  const cbNum = document.getElementById('cb-num');
  const num = String(card.id).padStart(2, '0');
  cfNum.textContent = num; cbNum.textContent = num;

  const dc = discClass(card.disc);
  document.getElementById('cf-disc').textContent = card.disc;
  document.getElementById('cf-disc').className = 'card-discipline disc-' + dc;
  document.getElementById('cb-disc').textContent = card.disc;
  document.getElementById('cb-disc').className = 'card-discipline disc-' + dc;

  document.getElementById('cf-tech').textContent = card.tech;
  document.getElementById('cf-def').textContent = card.def;
  document.getElementById('cb-ex').textContent = card.example;

  // Mark btn
  const markBtn = document.getElementById('btn-mark');
  markBtn.classList.toggle('marked', isDone);
  markBtn.innerHTML = isDone
    ? '<i class="bi bi-check2-circle"></i> Completada'
    : '<i class="bi bi-check2"></i> Marcar';

  // Nav buttons
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = currentIndex === total - 1;

  // Render exercise
  renderCardExercise(card);
  updateProgress();
}

function renderCardExercise(card) {
  const key = String(card.id);
  const saved = exerciseStates[key];

  const dropEl = document.getElementById('card-drop');
  const bankEl = document.getElementById('card-bank');
  const fb = document.getElementById('card-feedback');
  dropEl.innerHTML = '';
  bankEl.innerHTML = '';
  fb.textContent = '';
  fb.className = 'ex-feedback';

  // Shuffle for bank
  let shuffled = [...card.words];
  if (!saved) {
    shuffled = shuffle(shuffled);
  }

  const dropped = saved ? saved.dropped : [];
  const bankWords = saved ? saved.bank : shuffled;

  // Render bank
  bankWords.forEach((w, i) => {
    const chip = makeChip(w, i, 'card-bank', 'card-drop', false, 'chip');
    bankEl.appendChild(chip);
  });

  // Render drop
  dropped.forEach((w, i) => {
    const chip = makeChip(w, i, 'card-drop', 'card-bank', true, 'chip');
    dropEl.appendChild(chip);
  });

  if (saved && saved.feedback) {
    fb.textContent = saved.feedback;
    fb.className = 'ex-feedback ' + saved.feedbackClass;
  }
}

function makeChip(word, idx, homeZone, otherZone, inDrop, style) {
  const chip = document.createElement('div');
  chip.className = style === 'chip' ? 'word-chip' + (inDrop ? ' in-drop' : '') : 'lc-chip' + (inDrop ? ' in-drop' : '');
  chip.textContent = word;
  chip.draggable = true;
  chip.dataset.word = word;
  chip.dataset.home = homeZone;
  chip.dataset.other = otherZone;

  chip.addEventListener('dragstart', e => {
    draggedChip = chip;
    draggedFrom = homeZone;
    e.dataTransfer.effectAllowed = 'move';
  });
  chip.addEventListener('dragend', () => { draggedChip = null; });

  // Mobile: tap to move
  chip.addEventListener('click', () => {
    const src = document.getElementById(homeZone);
    const dst = document.getElementById(otherZone);
    if (src && dst) {
      dst.appendChild(chip);
      chip.dataset.home = otherZone;
      chip.dataset.other = homeZone;
      const wasInDrop = inDrop;
      inDrop = !wasInDrop;
      if (style === 'chip') {
        chip.className = 'word-chip' + (inDrop ? ' in-drop' : '');
      } else {
        chip.className = 'lc-chip' + (inDrop ? ' in-drop' : '');
      }
      saveCurrentExerciseState();
    }
  });

  return chip;
}

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, zoneId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggedChip) return;
  const zone = document.getElementById(zoneId);
  if (!zone) return;
  zone.appendChild(draggedChip);
  // Update chip style
  const inDrop = zoneId.includes('drop');
  if (draggedChip.className.includes('lc-chip')) {
    draggedChip.className = 'lc-chip' + (inDrop ? ' in-drop' : '');
  } else {
    draggedChip.className = 'word-chip' + (inDrop ? ' in-drop' : '');
  }
  draggedChip.dataset.home = zoneId;
  draggedChip.dataset.other = draggedFrom;
  saveCurrentExerciseState();
}

function saveCurrentExerciseState(feedback, feedbackClass) {
  const filtered = getFiltered();
  if (!filtered.length) return;
  const card = filtered[currentIndex];
  const key = String(card.id);
  const dropEl = document.getElementById('card-drop');
  const bankEl = document.getElementById('card-bank');
  if (!dropEl || !bankEl) return;
  const dropped = [...dropEl.children].map(c => c.dataset.word);
  const bank = [...bankEl.children].map(c => c.dataset.word);
  exerciseStates[key] = { dropped, bank, feedback: feedback || '', feedbackClass: feedbackClass || '' };
  saveExercises();
}

function checkCard(e) {
  e.stopPropagation();
  const filtered = getFiltered();
  if (!filtered.length) return;
  const card = filtered[currentIndex];
  const dropEl = document.getElementById('card-drop');
  const fb = document.getElementById('card-feedback');
  const dropped = [...dropEl.children].map(c => c.dataset.word);
  const correct = card.words;
  const isCorrect = JSON.stringify(dropped) === JSON.stringify(correct);
  fb.textContent = isCorrect ? '✓ ¡Correcto! El orden es perfecto.' : '✗ No es el orden correcto. Intenta de nuevo.';
  fb.className = 'ex-feedback ' + (isCorrect ? 'correct' : 'wrong');
  if (isCorrect && !completed.includes(card.id)) {
    completed.push(card.id);
    saveCompleted();
    updateProgress();
    renderCard();
  }
  saveCurrentExerciseState(fb.textContent, isCorrect ? 'correct' : 'wrong');
}

function resetCardExercise(e) {
  e.stopPropagation();
  const filtered = getFiltered();
  if (!filtered.length) return;
  const card = filtered[currentIndex];
  delete exerciseStates[String(card.id)];
  saveExercises();
  renderCardExercise(card);
}

function navigate(dir) {
  const filtered = getFiltered();
  currentIndex = Math.max(0, Math.min(filtered.length - 1, currentIndex + dir));
  resetFlip();
  renderCard();
}

function markDone() {
  const filtered = getFiltered();
  if (!filtered.length) return;
  const card = filtered[currentIndex];
  if (completed.includes(card.id)) {
    completed = completed.filter(id => id !== card.id);
  } else {
    completed.push(card.id);
  }
  saveCompleted();
  updateProgress();
  renderCard();
  renderList();
}

// ═══════════════════════════════════════════════
// LIST MODE
// ═══════════════════════════════════════════════
function renderList() {
  const filtered = getFiltered();
  const grid = document.getElementById('list-grid');
  const empty = document.getElementById('empty-msg');
  grid.innerHTML = '';

  if (!filtered.length) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  filtered.forEach(card => {
    const isDone = completed.includes(card.id);
    const dc = discClass(card.disc);
    const key = String(card.id);
    const saved = exerciseStates[key];

    const el = document.createElement('div');
    el.className = 'list-card' + (isDone ? ' completed' : '');
    el.id = 'lc-' + card.id;

    const shuffled = saved ? saved.bank : shuffle([...card.words]);
    const dropped = saved ? saved.dropped : [];
    const dropHTML = dropped.map(w =>
      `<div class="lc-chip in-drop" draggable="true" data-word="${w}" data-home="ld-${card.id}" data-other="lb-${card.id}" ondragstart="lcDragStart(event)" ondragend="lcDragEnd(event)" onclick="lcChipClick(event,'ld-${card.id}','lb-${card.id}')">${w}</div>`
    ).join('');
    const bankHTML = shuffled.map(w =>
      `<div class="lc-chip" draggable="true" data-word="${w}" data-home="lb-${card.id}" data-other="ld-${card.id}" ondragstart="lcDragStart(event)" ondragend="lcDragEnd(event)" onclick="lcChipClick(event,'lb-${card.id}','ld-${card.id}')">${w}</div>`
    ).join('');

    const feedbackHTML = saved && saved.feedback
      ? `<div class="lc-feedback ${saved.feedbackClass}">${saved.feedback}</div>` : `<div class="lc-feedback"></div>`;

    el.innerHTML = `
      <div class="lc-header">
        <span class="lc-num">#${String(card.id).padStart(2,'0')}</span>
        <span class="lc-disc ${dc}">${card.disc}</span>
        ${isDone ? '<span class="done-badge"><i class="bi bi-check2"></i> Hecho</span>' : ''}
      </div>
      <div class="lc-body">
        <div class="lc-technique">${card.tech}</div>
        <div class="lc-def">${card.def}</div>
        <div class="lc-example">${card.example}</div>
        <div class="lc-exercise">
          <div class="lc-ex-label"><i class="bi bi-puzzle"></i> Ordenar palabras</div>
          <div class="lc-drop-zone" id="ld-${card.id}"
            ondragover="lcDragOver(event)"
            ondrop="lcDrop(event,'ld-${card.id}','lb-${card.id}',${card.id})"
            ondragleave="lcDragLeave(event)">${dropHTML}</div>
          <div class="lc-word-bank" id="lb-${card.id}">${bankHTML}</div>
          <div class="lc-actions">
            <button class="lc-btn check" onclick="lcCheck(${card.id})">Verificar</button>
            <button class="lc-btn reset" onclick="lcReset(${card.id})">Reiniciar</button>
          </div>
          ${feedbackHTML}
        </div>
      </div>`;
    grid.appendChild(el);
  });
  updateProgress();
}

// LC drag handlers
let lcDragChip = null;
let lcDragSrc = null;

function lcDragStart(e) {
  lcDragChip = e.target;
  lcDragSrc = e.target.dataset.home;
  e.dataTransfer.effectAllowed = 'move';
}
function lcDragEnd() { lcDragChip = null; }
function lcDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function lcDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function lcDrop(e, dropId, bankId, cardId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!lcDragChip) return;
  const zone = document.getElementById(dropId);
  zone.appendChild(lcDragChip);
  lcDragChip.className = 'lc-chip in-drop';
  lcDragChip.dataset.home = dropId;
  lcDragChip.dataset.other = bankId;
  lcSaveState(cardId, dropId, bankId);
}

function lcChipClick(e, srcId, dstId) {
  const chip = e.currentTarget;
  const dst = document.getElementById(dstId);
  if (!dst) return;
  dst.appendChild(chip);
  const inDrop = dstId.startsWith('ld-');
  chip.className = 'lc-chip' + (inDrop ? ' in-drop' : '');
  chip.dataset.home = dstId;
  chip.dataset.other = srcId;
  // Extract cardId
  const cardId = parseInt(dstId.replace('ld-','').replace('lb-',''));
  const dropId = 'ld-' + cardId;
  const bankId = 'lb-' + cardId;
  lcSaveState(cardId, dropId, bankId);
}

function lcSaveState(cardId, dropId, bankId, feedback, feedbackClass) {
  const dropEl = document.getElementById(dropId);
  const bankEl = document.getElementById(bankId);
  if (!dropEl || !bankEl) return;
  const dropped = [...dropEl.children].map(c => c.dataset.word);
  const bank = [...bankEl.children].map(c => c.dataset.word);
  exerciseStates[String(cardId)] = { dropped, bank, feedback: feedback||'', feedbackClass: feedbackClass||'' };
  saveExercises();
}

function lcCheck(cardId) {
  const card = CARDS.find(c => c.id === cardId);
  const dropEl = document.getElementById('ld-' + cardId);
  const fbEl = dropEl.closest('.lc-exercise').querySelector('.lc-feedback');
  const dropped = [...dropEl.children].map(c => c.dataset.word);
  const isCorrect = JSON.stringify(dropped) === JSON.stringify(card.words);
  fbEl.textContent = isCorrect ? '✓ ¡Orden correcto!' : '✗ No es el orden correcto.';
  fbEl.className = 'lc-feedback ' + (isCorrect ? 'correct' : 'wrong');
  if (isCorrect && !completed.includes(cardId)) {
    completed.push(cardId);
    saveCompleted();
    updateProgress();
    renderList();
    return;
  }
  lcSaveState(cardId, 'ld-'+cardId, 'lb-'+cardId, fbEl.textContent, isCorrect ? 'correct':'wrong');
}

function lcReset(cardId) {
  delete exerciseStates[String(cardId)];
  saveExercises();
  renderList();
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function resetAll() {
  if (!confirm('¿Seguro que deseas reiniciar todo el progreso?')) return;
  completed = [];
  exerciseStates = {};
  localStorage.removeItem('rc_completed');
  localStorage.removeItem('rc_exercises');
  currentIndex = 0;
  resetFlip();
  updateProgress();
  if (currentMode === 'flash') renderCard();
  else renderList();
}

// ── Global drop zones for flashcard ──
document.addEventListener('DOMContentLoaded', () => {
  const cdrop = document.getElementById('card-drop');
  if (cdrop) {
    cdrop.addEventListener('dragover', e => onDragOver(e));
    cdrop.addEventListener('drop', e => onDrop(e, 'card-drop'));
    cdrop.addEventListener('dragleave', e => onDragLeave(e));
  }

  updateProgress();
  updateStatFilter();
  renderCard();
});
</script>
</body>
</html>
